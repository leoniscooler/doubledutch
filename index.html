function buildJacks(){
  const cx = JACKS.cx, cz = JACKS.cz;

  // Scatter 10 jacks in a small area on the ground
  for(let i = 0; i < 10; i++){
    const jx = cx + rand(-0.35, 0.35);
    const jz = cz + rand(-0.35, 0.35);
    const mesh = buildJackPiece(jx, jz);
    JACKS.jacks.push({ mesh, onGround: true });
  }

  // Rubber ball
  const ball = new THREE.Mesh(
    new THREE.SphereGeometry(0.04, 8, 6),
    mat(0xCC2222, { rough: 0.6 })
  );
  ball.position.set(cx + 0.15, 0.15, cz);
  ball.castShadow = false;
  scene.add(ball);
  JACKS.ball = ball;

  // Active child (crouching, facing the jacks)
  const active = buildCrouchingChild(cx, cz + 0.6, PI);
  JACKS.children.push(active);

  // 2 watching children sitting nearby
  const w1 = buildCrouchingChild(cx - 0.8, cz + 0.3, PI * 0.7);
  const w2 = buildCrouchingChild(cx + 0.9, cz + 0.1, -PI * 0.6);
  JACKS.children.push(w1, w2);

  JACKS.state = 'toss';
  JACKS.timer = JACKS.tossDur;
  JACKS.pickupTarget = 1;
  JACKS.pickedCount = 0;
}

function animateJacks(dt){
  const cx = JACKS.cx, cz = JACKS.cz;
  const t = performance.now() / 1000;
  const child = JACKS.children[0];
  if(!child) return;

  // Animate watchers (idle fidget, watching the game)
  for(let wi = 1; wi < JACKS.children.length; wi++){
    const w = JACKS.children[wi];
    const wt = t + wi * 1.7;
    w.head.rotation.y = sin(wt * 0.5 + wi) * 0.15;
    w.head.rotation.x = sin(wt * 0.3) * 0.05 - 0.1; // looking down at game
    w.group.position.y = sin(wt * 1.2) * 0.003;
    // Occasional lean-in
    w.torso.rotation.x = 0.4 + sin(wt * 0.4) * 0.05;
  }

  JACKS.timer -= dt;
  const ball = JACKS.ball;

  if(JACKS.state === 'toss'){
    // Ball goes up from hand
    const p = Math.max(0, Math.min(1, 1 - JACKS.timer / JACKS.tossDur));
    // Ball arcs up
    ball.position.x = cx + 0.05;
    ball.position.z = cz + 0.15;
    ball.position.y = lerp(JACKS.ballStartY, JACKS.ballPeakY, p);
    // Right arm tosses upward
    child.rArm.rotation.x = lerp(0.3, -1.8, p);
    child.rHand.position.y = lerp(0.28 * child.hs, 0.55 * child.hs, p);
    child.rHand.position.z = lerp(0.08, -0.05, p);
    // Eyes follow ball up
    child.head.rotation.x = lerp(-0.1, 0.3, p);

    if(JACKS.timer <= 0){
      JACKS.state = 'grab';
      JACKS.timer = JACKS.grabDur;
    }
  }
  else if(JACKS.state === 'grab'){
    // Ball hovers at peak, child quickly grabs jacks off ground
    const p = Math.max(0, Math.min(1, 1 - JACKS.timer / JACKS.grabDur));
    // Ball slowly descending from peak
    ball.position.y = lerp(JACKS.ballPeakY, JACKS.ballPeakY * 0.7, p);
    // Left hand darts down to grab jacks — fast motion
    const grabPhase = p < 0.5 ? p / 0.5 : 1;
    const retractPhase = p > 0.5 ? (p - 0.5) / 0.5 : 0;
    // Reach down
    child.lArm.rotation.x = lerp(0.3, 1.8, grabPhase) - retractPhase * 1.2;
    child.lHand.position.y = lerp(0.28 * child.hs, 0.05, grabPhase);
    child.lHand.position.y = lerp(child.lHand.position.y, 0.2 * child.hs, retractPhase);
    child.lHand.position.z = lerp(0.08, 0.25, grabPhase) - retractPhase * 0.15;
    // Torso leans more
    child.torso.rotation.x = 0.4 + sin(p * PI) * 0.25;
    // Fingers move fast (wiggle hand)
    child.lHand.rotation.z = sin(t * 25) * 0.3 * (1 - retractPhase);

    // Hide jacks that are being "picked up"
    if(p > 0.4 && p < 0.6){
      let hidden = 0;
      for(let j = 0; j < JACKS.jacks.length; j++){
        if(!JACKS.jacks[j].onGround) continue;
        if(hidden < JACKS.pickupTarget){
          JACKS.jacks[j].onGround = false;
          JACKS.jacks[j].mesh.visible = false;
          hidden++;
          JACKS.pickedCount++;
        }
      }
    }

    if(JACKS.timer <= 0){
      JACKS.state = 'catch';
      JACKS.timer = JACKS.catchDur;
    }
  }
  else if(JACKS.state === 'catch'){
    // Ball falls, child catches it with right hand
    const p = Math.max(0, Math.min(1, 1 - JACKS.timer / JACKS.catchDur));
    ball.position.y = lerp(JACKS.ballPeakY * 0.7, JACKS.ballStartY + 0.15, p);
    // Right arm comes down to catch
    child.rArm.rotation.x = lerp(-1.8, 0.5, p);
    child.rHand.position.y = lerp(0.55 * child.hs, 0.32 * child.hs, p);
    child.rHand.position.z = lerp(-0.05, 0.06, p);
    // Left hand returns to rest with jacks in it
    child.lArm.rotation.x = lerp(child.lArm.rotation.x, 0.3, p);
    child.lHand.position.y = lerp(child.lHand.position.y, 0.28 * child.hs, p);
    child.lHand.rotation.z = 0;
    child.torso.rotation.x = lerp(child.torso.rotation.x, 0.4, p);
    child.head.rotation.x = lerp(0.3, -0.1, p);
    // Ball bounce sound visual — small bounce near end
    if(p > 0.85){
      ball.position.y = JACKS.ballStartY + 0.15 + sin((p - 0.85) / 0.15 * PI) * 0.06;
    }

    if(JACKS.timer <= 0){
      JACKS.state = 'pause';
      JACKS.timer = 0.8 + rand(0, 0.6);
      ball.position.y = JACKS.ballStartY + 0.15;
    }
  }
  else if(JACKS.state === 'pause'){
    // Brief pause — watcher reactions, reset for next toss
    const p = Math.max(0, Math.min(1, 1 - JACKS.timer / 1.2));
    // Rest pose
    child.rArm.rotation.x = 0.3;
    child.lArm.rotation.x = 0.3;
    child.head.rotation.x = -0.1;
    // Watcher nod/smile
    if(JACKS.children[1]) JACKS.children[1].head.rotation.x = -0.1 + sin(t * 3) * 0.08;
    if(JACKS.children[2]) JACKS.children[2].head.rotation.y = sin(t * 2) * 0.2;

    if(JACKS.timer <= 0){
      // Check if all jacks picked up at current level
      const remaining = JACKS.jacks.filter(j => j.onGround).length;
      if(remaining <= 0){
        // Level up! Reset all jacks, increase pickup target
        JACKS.pickupTarget = Math.min(JACKS.pickupTarget + 1, 5);
        JACKS.jacks.forEach((j, i) => {
          j.onGround = true;
          j.mesh.visible = true;
          j.mesh.position.x = cx + rand(-0.35, 0.35);
          j.mesh.position.z = cz + rand(-0.35, 0.35);
          j.mesh.rotation.y = rand(0, TAU);
        });
        JACKS.pickedCount = 0;
      }
      // Occasional "miss" — drop jacks back, reset level
      if(Math.random() < 0.08){
        JACKS.pickupTarget = 1;
        JACKS.jacks.forEach(j => {
          j.onGround = true;
          j.mesh.visible = true;
          j.mesh.position.x = cx + rand(-0.35, 0.35);
          j.mesh.position.z = cz + rand(-0.35, 0.35);
        });
        JACKS.pickedCount = 0;
      }
      JACKS.state = 'toss';
      JACKS.timer = JACKS.tossDur;
    }
  }

  // Player collision with jacks children
  const px = playerPos.x, pz = playerPos.z;
  JACKS.children.forEach(npc => {
    const nx = npc.group.position.x, nz = npc.group.position.z;
    const dx = px - nx, dz = pz - nz;
    const dist = Math.sqrt(dx*dx + dz*dz);
    const minDist = 0.5;
    if(dist < minDist && dist > 0.001){
      const push = minDist - dist;
      playerPos.x += (dx / dist) * push;
      playerPos.z += (dz / dist) * push;
      const ux = dx / dist, uz = dz / dist;
      const vDotN = playerVelX * ux + playerVelZ * uz;
      if(vDotN < 0){ playerVelX -= vDotN * ux; playerVelZ -= vDotN * uz; }
    }
  });
}

function buildMarbles(){
  const cx = MARBS.cx, cz = MARBS.cz, cr = MARBS.circleR;

  // Chalk circle on the ground
  const segments = 48;
  const circleGeo = new THREE.BufferGeometry();
  const circVerts = [];
  for(let i = 0; i <= segments; i++){
    const a = (i / segments) * TAU;
    const a2 = ((i + 1) / segments) * TAU;
    const rInner = cr - 0.03, rOuter = cr + 0.03;
    circVerts.push(
      cx + cos(a)*rInner, 0.006, cz + sin(a)*rInner,
      cx + cos(a)*rOuter, 0.006, cz + sin(a)*rOuter,
      cx + cos(a2)*rOuter, 0.006, cz + sin(a2)*rOuter,
      cx + cos(a)*rInner, 0.006, cz + sin(a)*rInner,
      cx + cos(a2)*rOuter, 0.006, cz + sin(a2)*rOuter,
      cx + cos(a2)*rInner, 0.006, cz + sin(a2)*rInner,
    );
  }
  circleGeo.setAttribute('position', new THREE.Float32BufferAttribute(circVerts, 3));
  const circleMesh = new THREE.Mesh(circleGeo, mat(0xFFFFFF, {transparent:true, opacity:0.25, rough:1}));
  scene.add(circleMesh);

  // 12 colorful marbles inside the circle
  const marbleColors = [0xFF4444,0x4488FF,0x44CC44,0xFFCC00,0xFF8800,0xCC44FF,
                        0x44DDDD,0xFF6699,0x88FF44,0xFFFFFF,0x2266AA,0xDD4488];
  const marbleGeo = new THREE.SphereGeometry(0.02, 6, 5);
  for(let i = 0; i < 12; i++){
    const angle = rand(0, TAU);
    const r = rand(0, cr * 0.7);
    const mx = cx + cos(angle) * r;
    const mz = cz + sin(angle) * r;
    const mesh = new THREE.Mesh(marbleGeo, mat(marbleColors[i], {metalness:0.1, rough:0.2}));
    mesh.position.set(mx, 0.02, mz);
    mesh.castShadow = false;
    scene.add(mesh);
    MARBS.marbles.push({ mesh, vx:0, vz:0, x: mx, z: mz, inCircle: true });
  }

  // Shooter marble (larger, glass-like)
  const shooterMesh = new THREE.Mesh(
    new THREE.SphereGeometry(0.03, 8, 6),
    mat(0x88CCFF, { metalness: 0.15, rough: 0.15, transparent: true, opacity: 0.85 })
  );
  shooterMesh.position.set(cx, 0.03, cz + cr + 0.15);
  shooterMesh.castShadow = false;
  scene.add(shooterMesh);
  MARBS.shooter = { mesh: shooterMesh, vx: 0, vz: 0, x: shooterMesh.position.x, z: shooterMesh.position.z };

  // 3 children kneeling around the circle
  const childData = [
    { x: cx, z: cz + cr + 0.55, rot: PI },       // south side, facing north
    { x: cx - cr - 0.5, z: cz - 0.15, rot: PI * 0.4 },  // west side
    { x: cx + cr + 0.55, z: cz + 0.1, rot: -PI * 0.4 }, // east side
  ];
  childData.forEach(cd => {
    const c = buildKneelingChild(cd.x, cd.z, cd.rot);
    MARBS.children.push(c);
  });

  MARBS.state = 'aim';
  MARBS.timer = MARBS.aimDur;
  MARBS.turnChild = 0;
}

function animateMarbles(dt){
  const cx = MARBS.cx, cz = MARBS.cz, cr = MARBS.circleR;
  const t = performance.now() / 1000;
  const active = MARBS.children[MARBS.turnChild];
  if(!active) return;

  // Idle animation for non-active children
  MARBS.children.forEach((c, ci) => {
    if(ci === MARBS.turnChild) return;
    const wt = t + ci * 2.1;
    c.head.rotation.x = -0.15 + sin(wt * 0.4) * 0.06; // looking at game
    c.head.rotation.y = sin(wt * 0.3 + ci) * 0.12;
    c.group.position.y = sin(wt * 1.0) * 0.003;
    c.torso.rotation.x = 0.3 + sin(wt * 0.5) * 0.03;
  });

  MARBS.timer -= dt;
  const shooter = MARBS.shooter;

  if(MARBS.state === 'aim'){
    // Active child positions hand near shooter, small aim adjustments
    const p = Math.max(0, Math.min(1, 1 - MARBS.timer / MARBS.aimDur));
    // Hand near ground, near shooter
    active.rArm.rotation.x = 1.2 + sin(t * 2) * 0.1;
    active.rHand.position.y = 0.06;
    active.rHand.position.z = 0.18 + sin(t * 1.5) * 0.02;
    active.thumb.rotation.x = -0.8 + sin(t * 3) * 0.15; // coiling thumb
    // Lean in
    active.torso.rotation.x = 0.4 + sin(t * 0.8) * 0.05;
    active.head.rotation.x = -0.25; // looking down at marbles
    // Shooter stays in front of child
    shooter.mesh.position.set(
      active.group.position.x + sin(active.group.rotation.y) * 0.25,
      0.03,
      active.group.position.z - cos(active.group.rotation.y) * 0.25
    );
    shooter.x = shooter.mesh.position.x;
    shooter.z = shooter.mesh.position.z;

    if(MARBS.timer <= 0){
      // Pick a target marble
      const targets = MARBS.marbles.filter(m => m.inCircle);
      if(targets.length === 0){
        // Reset all marbles
        MARBS.marbles.forEach((m, i) => {
          const angle = rand(0, TAU);
          const r = rand(0, cr * 0.7);
          m.x = cx + cos(angle) * r;
          m.z = cz + sin(angle) * r;
          m.mesh.position.set(m.x, 0.02, m.z);
          m.inCircle = true;
          m.vx = 0; m.vz = 0;
        });
      }
      // Calculate flick direction toward center cluster
      const dirX = cx - shooter.x;
      const dirZ = cz - shooter.z;
      const dirLen = Math.sqrt(dirX*dirX + dirZ*dirZ);
      const speed = rand(2.5, 4.0);
      shooter.vx = (dirX / dirLen) * speed + rand(-0.3, 0.3);
      shooter.vz = (dirZ / dirLen) * speed + rand(-0.3, 0.3);
      MARBS.state = 'flick';
      MARBS.timer = MARBS.flickDur;
      MARBS.knockedOut = [];
    }
  }
  else if(MARBS.state === 'flick'){
    // Thumb flick animation
    const p = Math.max(0, Math.min(1, 1 - MARBS.timer / MARBS.flickDur));
    // Thumb snaps forward
    if(p < 0.4){
      active.thumb.rotation.x = lerp(-0.8, 1.2, p / 0.4);
    } else {
      active.thumb.rotation.x = lerp(1.2, 0, (p - 0.4) / 0.6);
    }
    active.rHand.position.z = 0.18 + p * 0.06;

    if(MARBS.timer <= 0){
      MARBS.state = 'rolling';
      MARBS.timer = 2.0; // max roll time
    }
  }
  else if(MARBS.state === 'rolling'){
    // Physics: shooter and marbles move with friction and collisions
    const friction = 3.0;

    // Update shooter position
    shooter.x += shooter.vx * dt;
    shooter.z += shooter.vz * dt;
    // Friction
    const sSpeed = Math.sqrt(shooter.vx*shooter.vx + shooter.vz*shooter.vz);
    if(sSpeed > 0.01){
      const fric = Math.min(friction * dt, sSpeed);
      shooter.vx -= (shooter.vx / sSpeed) * fric;
      shooter.vz -= (shooter.vz / sSpeed) * fric;
    } else {
      shooter.vx = 0; shooter.vz = 0;
    }
    shooter.mesh.position.set(shooter.x, 0.03, shooter.z);

    // Shooter-marble collisions
    MARBS.marbles.forEach((m, mi) => {
      const dx = shooter.x - m.x;
      const dz = shooter.z - m.z;
      const dist = Math.sqrt(dx*dx + dz*dz);
      const minD = 0.05; // shooter radius + marble radius
      if(dist < minD && dist > 0.001){
        // Elastic-ish collision
        const nx = dx / dist, nz = dz / dist;
        const relVx = shooter.vx - m.vx, relVz = shooter.vz - m.vz;
        const dot = relVx * nx + relVz * nz;
        if(dot < 0){
          // Transfer momentum (shooter is heavier)
          shooter.vx -= dot * nx * 0.4;
          shooter.vz -= dot * nz * 0.4;
          m.vx += dot * nx * -0.8;
          m.vz += dot * nz * -0.8;
        }
        // Separate
        const overlap = minD - dist;
        m.x -= nx * overlap * 0.7;
        m.z -= nz * overlap * 0.7;
        shooter.x += nx * overlap * 0.3;
        shooter.z += nz * overlap * 0.3;
      }
    });

    // Marble-marble collisions + update positions
    let anyMoving = false;
    MARBS.marbles.forEach((m, mi) => {
      m.x += m.vx * dt;
      m.z += m.vz * dt;
      const mSpeed = Math.sqrt(m.vx*m.vx + m.vz*m.vz);
      if(mSpeed > 0.01){
        const fric = Math.min(friction * 1.2 * dt, mSpeed);
        m.vx -= (m.vx / mSpeed) * fric;
        m.vz -= (m.vz / mSpeed) * fric;
        anyMoving = true;
      } else {
        m.vx = 0; m.vz = 0;
      }
      m.mesh.position.set(m.x, 0.02, m.z);

      // Check if knocked out of circle
      const fromCenter = Math.sqrt((m.x - cx)*(m.x - cx) + (m.z - cz)*(m.z - cz));
      if(m.inCircle && fromCenter > cr){
        m.inCircle = false;
        MARBS.knockedOut.push(mi);
      }

      // Marble-marble collision
      for(let mj = mi + 1; mj < MARBS.marbles.length; mj++){
        const o = MARBS.marbles[mj];
        const ddx = m.x - o.x, ddz = m.z - o.z;
        const dd = Math.sqrt(ddx*ddx + ddz*ddz);
        const minDD = 0.04;
        if(dd < minDD && dd > 0.001){
          const nnx = ddx/dd, nnz = ddz/dd;
          const rv = (m.vx-o.vx)*nnx + (m.vz-o.vz)*nnz;
          if(rv < 0){
            m.vx -= rv * nnx * 0.5;
            m.vz -= rv * nnz * 0.5;
            o.vx += rv * nnx * 0.5;
            o.vz += rv * nnz * 0.5;
          }
          const sep = (minDD - dd) * 0.5;
          m.x += nnx * sep; m.z += nnz * sep;
          o.x -= nnx * sep; o.z -= nnz * sep;
        }
      }
    });

    if(sSpeed < 0.01) anyMoving = false; // include shooter
    else anyMoving = true;

    // Children watch the rolling (heads track shooter)
    MARBS.children.forEach(c => {
      const dx = shooter.x - c.group.position.x;
      const dz = shooter.z - c.group.position.z;
      c.head.rotation.y = Math.atan2(dx, dz) - c.group.rotation.y;
    });

    if(!anyMoving || MARBS.timer <= 0){
      if(MARBS.knockedOut.length > 0){
        MARBS.state = 'collect';
        MARBS.timer = MARBS.collectDur;
      } else {
        MARBS.state = 'nextTurn';
        MARBS.timer = 0.6;
      }
    }
  }
  else if(MARBS.state === 'collect'){
    // Active child reaches to pick up knocked-out marbles
    const p = Math.max(0, Math.min(1, 1 - MARBS.timer / MARBS.collectDur));
    active.lArm.rotation.x = lerp(0.3, 1.5, p < 0.5 ? p/0.5 : 1 - (p-0.5)/0.5);
    active.lHand.position.y = lerp(0.24*active.hs, 0.04, p < 0.5 ? p/0.5 : 1 - (p-0.5)/0.5);
    active.torso.rotation.x = 0.3 + sin(p * PI) * 0.2;
    // Hide collected marbles gradually (child pockets them)
    if(p > 0.5){
      MARBS.knockedOut.forEach(mi => {
        const m = MARBS.marbles[mi];
        if(m) m.mesh.visible = false;
      });
    }

    if(MARBS.timer <= 0){
      // Nod with satisfaction
      active.head.rotation.x = -0.3;
      MARBS.state = 'nextTurn';
      MARBS.timer = 0.5 + rand(0, 0.4);
    }
  }
  else if(MARBS.state === 'nextTurn'){
    // Rotate to next child
    active.rArm.rotation.x = 0.3;
    active.lArm.rotation.x = 0.3;
    active.lHand.position.y = 0.24 * active.hs;
    active.rHand.position.y = 0.24 * active.hs;
    active.rHand.position.z = 0.06;
    active.thumb.rotation.x = -0.5;
    active.torso.rotation.x = 0.3;
    active.head.rotation.x = -0.15;

    if(MARBS.timer <= 0){
      // Respawn hidden marbles back randomly if too few remain
      const visible = MARBS.marbles.filter(m => m.mesh.visible && m.inCircle).length;
      if(visible < 4){
        MARBS.marbles.forEach(m => {
          if(!m.mesh.visible || !m.inCircle){
            const angle = rand(0, TAU);
            const r = rand(0, cr * 0.6);
            m.x = cx + cos(angle) * r;
            m.z = cz + sin(angle) * r;
            m.mesh.position.set(m.x, 0.02, m.z);
            m.mesh.visible = true;
            m.inCircle = true;
            m.vx = 0; m.vz = 0;
          }
        });
      }
      MARBS.turnChild = (MARBS.turnChild + 1) % MARBS.children.length;
      MARBS.knockedOut = [];
      MARBS.state = 'aim';
      MARBS.timer = MARBS.aimDur + rand(0, 0.5);
      // Position shooter near new active child
      const next = MARBS.children[MARBS.turnChild];
      if(next){
        shooter.x = next.group.position.x + sin(next.group.rotation.y) * 0.25;
        shooter.z = next.group.position.z - cos(next.group.rotation.y) * 0.25;
        shooter.mesh.position.set(shooter.x, 0.03, shooter.z);
        shooter.vx = 0; shooter.vz = 0;
      }
    }
  }

  // Player collision with marble children
  const px = playerPos.x, pz = playerPos.z;
  MARBS.children.forEach(npc => {
    const nx = npc.group.position.x, nz = npc.group.position.z;
    const dx = px - nx, dz = pz - nz;
    const dist = Math.sqrt(dx*dx + dz*dz);
    const minDist = 0.5;
    if(dist < minDist && dist > 0.001){
      const push = minDist - dist;
      playerPos.x += (dx / dist) * push;
      playerPos.z += (dz / dist) * push;
      const ux = dx / dist, uz = dz / dist;
      const vDotN = playerVelX * ux + playerVelZ * uz;
      if(vDotN < 0){ playerVelX -= vDotN * ux; playerVelZ -= vDotN * uz; }
    }
  });
}

// ── DISTANT PROTEST MARCH (LOOP AROUND MAP) ──────────
const marchGroup = [];
const MARCH_DIST = 22;
const MARCH_SPEED = 1.6;
const MARCH_ROWS = 4;
const MARCH_PER_ROW = 10;
const LOOP_SIDES = [
  {axis:'x', dir:1,  fx:0, fz:-MARCH_DIST, rot:PI/2},
  {axis:'z', dir:1,  fx:MARCH_DIST, fz:0,  rot:0},
  {axis:'x', dir:-1, fx:0, fz:MARCH_DIST,  rot:-PI/2},
  {axis:'z', dir:-1, fx:-MARCH_DIST, fz:0,  rot:PI},
];
const LOOP_HALF = MARCH_DIST;
// Total perimeter of loop = 4 sides × 2×MARCH_DIST = 8×MARCH_DIST
const LOOP_PERIM = 8 * MARCH_DIST;
// Corner radius for smooth turning
const CORNER_R = 1.5;

function buildDistantStreet(){
  const streetMat = mat(0x2a2a2a, {rough:0.95});
  const swMat = mat(0x777770, {rough:0.9});

  LOOP_SIDES.forEach((side) => {

      sw.receiveShadow = true; scene.add(sw);
    });

    const outDir = isX ? (side.fz<0?-1:1) : (side.fx<0?-1:1);
    for(let t=-28; t<=28; t+=rand(5,7.5)){
      const bw=rand(4,6.5), bh=rand(6,14), bd=rand(4,5.5);
      const bCol=brickColors[floor(Math.random()*brickColors.length)];
      if(isX){
        const b=new THREE.Mesh(new THREE.BoxGeometry(bw,bh,bd), mat(bCol,{rough:0.9}));
        b.position.set(side.fx+t, bh/2, side.fz+outDir*6.5);
        scene.add(b);
        const wM=mat(0xffcc66,{rough:0.5,emissive:0xffcc66,emissiveIntensity:0.1,transparent:true,opacity:0.6});
        for(let wy=2;wy<bh-1;wy+=2.2) for(let wx=-bw/2+0.8;wx<bw/2-0.5;wx+=1.3)
          if(Math.random()>0.25){
            const w=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.7),wM);
            w.position.set(side.fx+t+wx,wy,side.fz+outDir*6.5-outDir*bd/2-0.01);
            scene.add(w);
          }
      } else {
        const b=new THREE.Mesh(new THREE.BoxGeometry(bd,bh,bw), mat(bCol,{rough:0.9}));
        b.position.set(side.fx+outDir*6.5, bh/2, side.fz+t);
        scene.add(b);
        const wM=mat(0xffcc66,{rough:0.5,emissive:0xffcc66,emissiveIntensity:0.1,transparent:true,opacity:0.6});
        for(let wy=2;wy<bh-1;wy+=2.2) for(let wz=-bw/2+0.8;wz<bw/2-0.5;wz+=1.3)
          if(Math.random()>0.25){
            const w=new THREE.Mesh(new THREE.PlaneGeometry(0.5,0.7),wM);
            w.position.set(side.fx+outDir*6.5-outDir*bd/2-0.01,wy,side.fz+t+wz);
            w.rotation.y=PI/2; scene.add(w);

    }

    const inDir=-outDir;
    for(let pt=-25;pt<=25;pt+=12){
      if(isX){
        const p=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,7,6),poleMat);
        p.position.set(side.fx+pt+rand(-1,1),3.5,side.fz+inDir*3.5); scene.add(p);
        const br=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,2.2,4),poleMat);
        br.position.set(side.fx+pt+rand(-1,1),6.8,side.fz+inDir*3.5); br.rotation.z=PI/2; scene.add(br);
      } else {
        const p=new THREE.Mesh(new THREE.CylinderGeometry(0.06,0.08,7,6),poleMat);
        p.position.set(side.fx+inDir*3.5,3.5,side.fz+pt+rand(-1,1)); scene.add(p);
        const br=new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.03,2.2,4),poleMat);
        br.position.set(side.fx+inDir*3.5,6.8,side.fz+pt+rand(-1,1)); br.rotation.x=PI/2; scene.add(br);

    [-20,-8,8,20].forEach(ct => {

      if(isX){

function buildMarcher(startT){

  const jacketColors=[0x1a1a1a,0x222222,0x181818,0x252525,0x151515];
  const jacketM=mat(jacketColors[floor(Math.random()*jacketColors.length)],{rough:0.75});
  const pantsM=mat(0x1a1a2e);
  const hScale=rand(0.9,1.1);

  const torso=new THREE.Mesh(new THREE.CylinderGeometry(0.16,0.19,0.55,7),jacketM);

  [-0.08,0.08].forEach(lx=>{

  const armGeo=new THREE.CylinderGeometry(0.045,0.04,0.4,6);

  lArm.position.set(-0.22,1.05*hScale,0); g.add(lArm);
  const rArm=new THREE.Mesh(armGeo,jacketM);
  rArm.position.set(0.22,1.05*hScale,0); g.add(rArm);

  const headM=new THREE.Mesh(new THREE.SphereGeometry(0.13,8,7),skinM);
  headM.position.y=1.52*hScale; headM.castShadow=true; g.add(headM);

  const beretMat=mat(0x111111);
  const beret=new THREE.Mesh(new THREE.SphereGeometry(0.15,10,5,0,TAU,0,PI*0.45),beretMat);
  beret.position.y=1.6*hScale; beret.rotation.x=-0.15; g.add(beret);

  [-0.08,0.08].forEach(sx=>{

  const role=Math.random();

  if(role<0.35){

    stick.position.set(0.12,1.9*hScale,0.05); g.add(stick);
    const placard=new THREE.Mesh(new THREE.BoxGeometry(0.5,0.3,0.02),mat(0xf0e8d0,{rough:0.9}));
    placard.position.set(0.12,2.55*hScale,0.05); g.add(placard);
    const ts1=new THREE.Mesh(new THREE.BoxGeometry(0.4,0.06,0.025),mat(0x222222));
    ts1.position.set(0.12,2.55*hScale,0.065); g.add(ts1);
    const ts2=new THREE.Mesh(new THREE.BoxGeometry(0.32,0.05,0.025),mat(0x222222));
    ts2.position.set(0.12,2.46*hScale,0.065); g.add(ts2);
    rArm.rotation.x=-2.8; rArm.position.y=1.2*hScale;
  } else if(role<0.55){
    hasFist=true;
    rArm.rotation.x=-2.9; rArm.position.y=1.2*hScale;

    fist.position.set(0.22,1.75*hScale,0.05); g.add(fist);

  return {
    group:g, lArm, rArm,

    hasSign, hasFist,

}

// Convert a perimeter distance (0..LOOP_PERIM) to world position + rotation
// Marchers walk counterclockwise: bottom(+x), right(+z), top(-x), left(-z)
function marchPosFromPerim(perim, rowOff){
  let p = ((perim % LOOP_PERIM) + LOOP_PERIM) % LOOP_PERIM;
  const D = MARCH_DIST;
  const sideLen = 2 * D;
  const sideIdx = Math.floor(p / sideLen);
  const along = p - sideIdx * sideLen; // 0..sideLen along this side
  const t = along - D; // -D..+D centered on side

  // Corner blending zone
  const cZone = CORNER_R;
  const nearEnd = t > (D - cZone);
  const nearStart = t < (-D + cZone);

  const side = LOOP_SIDES[sideIdx];
  const nextSide = LOOP_SIDES[(sideIdx + 1) % 4];
  const isX = side.axis === 'x';

  let x, z, rot;

  if(nearEnd){
    // Blend into next side's corner
    const blend = (t - (D - cZone)) / cZone; // 0..1
    const angle = blend * PI / 2; // 0..90 degrees of the corner
    // Corner center
    let cx, cz;
    if(sideIdx === 0)      { cx = D;  cz = -D; } // bottom-right
    else if(sideIdx === 1)  { cx = D;  cz = D;  } // top-right
    else if(sideIdx === 2)  { cx = -D; cz = D;  } // top-left
    else                    { cx = -D; cz = -D; } // bottom-left
    // Radius offset for the turn
    const r = cZone;
    if(sideIdx === 0)      { x = cx - r * Math.cos(angle); z = cz + r * Math.sin(angle); }
    else if(sideIdx === 1)  { x = cx - r * Math.sin(angle); z = cz - r * Math.cos(angle); }
    else if(sideIdx === 2)  { x = cx + r * Math.cos(angle); z = cz - r * Math.sin(angle); }
    else                    { x = cx + r * Math.sin(angle); z = cz + r * Math.cos(angle); }
    // Blend rotation
    let r1 = side.rot, r2 = nextSide.rot;
    let rd = r2 - r1;
    while(rd > PI) rd -= TAU;
    while(rd < -PI) rd += TAU;
    rot = r1 + rd * blend;
  } else {
    // Straight section
    if(isX){ x = side.fx + t * side.dir; z = side.fz; }
    else   { x = side.fx;                z = side.fz + t * side.dir; }
    rot = side.rot;
  }

  // Apply row offset perpendicular to march direction
  x += Math.cos(rot) * rowOff;
  z -= Math.sin(rot) * rowOff;

  return {x, z, rot};
}

function buildMarchGroup(){
  for(let si=0;si<4;si++){
    for(let row=0;row<MARCH_ROWS;row++){
      for(let col=0;col<MARCH_PER_ROW;col++){
        const sideLen = 2 * MARCH_DIST;
        const basePerim = si * sideLen + (col + 0.5) * (sideLen / MARCH_PER_ROW);
        const startPerim = basePerim + rand(-2, 2);
        const m=buildMarcher(startPerim);
        m.sideIdx=si;
        m.perim = ((startPerim % LOOP_PERIM) + LOOP_PERIM) % LOOP_PERIM;
        m.rowOff=(row-1.5)*1.0+rand(-0.15,0.15);
        const p=marchPosFromPerim(m.perim, m.rowOff);
        m.group.position.set(p.x,0,p.z);
        m.group.rotation.y=p.rot;
        // Marchers don't cast shadows (huge perf savings — 160×12 meshes)
        m.group.traverse(c => { if(c.isMesh) c.castShadow = false; });
        scene.add(m.group);
        marchGroup.push(m);
      }
    }
  }
}

const MARCH_AVOID_R = 2.0;   // radius at which marchers start avoiding the player
const MARCH_AVOID_PUSH = 2.5; // strength of sideways push

function animateMarch(dt){
  const px = playerPos.x, pz = playerPos.z;
  const camX = camera.position.x, camZ = camera.position.z;
  const t = performance.now() / 1000;
  for(let mi = 0; mi < marchGroup.length; mi++){
    const m = marchGroup[mi];
    m.perim = ((m.perim + m.speed * dt) % LOOP_PERIM + LOOP_PERIM) % LOOP_PERIM;
    const p=marchPosFromPerim(m.perim, m.rowOff);
    let mx = p.x, mz = p.z, mRot = p.rot;

    // --- crowd avoidance: marchers flow around the player ---
    const dx = mx - px, dz = mz - pz;
    const distSq = dx*dx + dz*dz;
    const dist = distSq < MARCH_AVOID_R * MARCH_AVOID_R ? Math.sqrt(distSq) : 999;
    if(dist < MARCH_AVOID_R && dist > 0.01){
      const strength = 1.0 - (dist / MARCH_AVOID_R);
      const push = strength * strength * MARCH_AVOID_PUSH;
      const nx = dx / dist, nz = dz / dist;
      mx += nx * push;
      mz += nz * push;
      const avoidAngle = Math.atan2(nx, nz);
      let angleDiff = avoidAngle - mRot;
      while(angleDiff > PI) angleDiff -= TAU;
      while(angleDiff < -PI) angleDiff += TAU;
      mRot += angleDiff * strength * 0.35;
    }

    // Smooth position so avoidance isn't jerky
    if(m._prevX === undefined){ m._prevX = mx; m._prevZ = mz; m._prevRot = mRot; }
    const smooth = 1 - Math.exp(-6.0 * dt);
    m._prevX += (mx - m._prevX) * smooth;
    m._prevZ += (mz - m._prevZ) * smooth;
    let rDiff = mRot - m._prevRot;
    while(rDiff > PI) rDiff -= TAU;
    while(rDiff < -PI) rDiff += TAU;
    m._prevRot += rDiff * smooth;

    m.group.position.x = m._prevX;
    m.group.position.z = m._prevZ;
    m.group.rotation.y = m._prevRot;

    // Distance-based LOD: skip limb animations for distant marchers
    const cdx = m._prevX - camX, cdz = m._prevZ - camZ;
    const camDistSq = cdx*cdx + cdz*cdz;
    if(camDistSq > 400){ // >20 units from camera — freeze limbs, just position
      m.group.position.y = 0;
      continue;
    }

    const ph = m.phase;
    if(camDistSq < 225){ // <15 units — full animation
      m.legs.forEach((leg,li)=>{ leg.rotation.x=sin(t*3.2+ph)*m.walkAmp*(li===0?1:-1); });
      if(!m.hasSign&&!m.hasFist){
        m.lArm.rotation.x=sin(t*3.2+ph)*0.2;
        m.rArm.rotation.x=-sin(t*3.2+ph)*0.2;
      } else if(m.hasSign){ m.lArm.rotation.x=sin(t*3.2+ph)*0.15;
      } else if(m.hasFist){ m.rArm.rotation.x=-2.9+sin(t*1.5+m.chantPhase)*0.12; }
      m.group.position.y=sin(t*6.4+ph)*0.015;
      m.headMesh.rotation.y=sin(t*0.7+m.headTurnPhase)*0.15;
    } else { // 15-20 units — reduced animation (legs only)
      m.legs.forEach((leg,li)=>{ leg.rotation.x=sin(t*3.2+ph)*m.walkAmp*(li===0?1:-1); });
      m.group.position.y=0;
    }

    // When close to player, marchers glance at them
    if(dist < MARCH_AVOID_R * 1.3){
      const glance = Math.atan2(px - m._prevX, pz - m._prevZ) - m._prevRot;
      m.headMesh.rotation.y = clamp(glance, -0.6, 0.6);
    }
  }
}

// ═══════════════════════════════════
//  TURNER ANIMATION  (IK — hands track rope endpoints)
// ═══════════════════════════════════
const WRIST_RADIUS = 0.35; // small wrist circle at rope endpoints
const HAND_HEIGHT  = 1.5;  // height of the rope attachment on turners

// Arm segment lengths (must match buildCharacterModel)
const UPPER_ARM_LEN = 0.35;
const FOREARM_LEN   = 0.32;  // forearm mesh 0.3 + hand offset
const TOTAL_ARM_LEN = UPPER_ARM_LEN + FOREARM_LEN;

function animateTurner(model, angle1, angle2, dt, side){
  const ud = model.userData;
  if(!ud.leftArm || !ud.rightArm) return;

  // Which arm holds which rope
  const arm1 = (side==='L') ? ud.rightArm : ud.leftArm;   // rope1
  const arm2 = (side==='L') ? ud.leftArm  : ud.rightArm;  // rope2
  const fore1 = arm1.children[1];
  const fore2 = arm2.children[1];

  // Get the actual rope endpoint positions that each hand must follow
  const ep1 = getRopeEndpoint(angle1);
  const ep2 = getRopeEndpoint(angle2);

  // Shoulder world Y (torso 0.9 + shoulders 0.55)
  const shoulderY = 1.45;

  function aimArmToRope(arm, forearm, ep, armSideSign){
    // ep.y = world Y of the rope endpoint this hand grips
    // ep.z = world Z offset (very small, mostly 0)
    //
    // We need the arm to reach from the shoulder to the rope endpoint
    // while staying IN FRONT of the body (never going behind).
    //
    // dy = how far below/above the shoulder (negative = below)
    // The arm hangs at the shoulder and rotates in X to reach the target.
    
    const dy = ep.y - shoulderY;  // range: about -0.3 to +0.4
    const dz = ep.z;              // very small forward offset

    // How far the hand needs to reach (in the vertical plane in front of body)
    // We keep a constant forward reach so the arm stays in front.
    const forwardReach = 0.2; // always reach slightly forward
    const totalDz = forwardReach + dz;

    // Arm pitch: atan2 maps the vertical offset to an angle
    // When dy < 0 (below shoulder): arm angles down-forward
    // When dy > 0 (above shoulder): arm angles up-forward
    // The arm starts pointing down (rotation.x = 0), negative X = forward/up
    const targetAngle = Math.atan2(totalDz, -dy);
    // Clamp so arm stays in front: between -1.8 (forward-down) and -0.4 (forward-up)
    const armPitch = clamp(-(PI/2) + targetAngle, -1.8, -0.3);

    arm.rotation.x = armPitch;
    arm.rotation.z = armSideSign * -0.2; // slight outward spread

    // Forearm: bend to fine-tune reaching the exact endpoint
    // More bent when reaching far down, straighter when up
    if(forearm){
      const t = (dy + 0.35) / 0.7; // normalize dy to 0..1 range
      const bend = lerp(-0.5, -0.2, clamp(t, 0, 1));
      forearm.rotation.x = bend;
    }
  }

  const outerSign = (side==='L') ? 0.15 : -0.15;
  const innerSign = (side==='L') ? -0.15 : 0.15;

  aimArmToRope(arm1, fore1, ep1, outerSign);
  aimArmToRope(arm2, fore2, ep2, innerSign);

  // Slight body sway
  ud.torso.rotation.z = sin(angle1*0.5)*0.02;
}

function getRopeEndpoint(angle, height=HAND_HEIGHT){
  // Real Double Dutch: hands pump up and down, not in a full circle.
  // Vertical (Y) is the primary motion; forward/back (Z) is very subtle.
  const y = height + WRIST_RADIUS * sin(angle);
  const z = WRIST_RADIUS * 0.12 * cos(angle);  // barely any depth motion
  return {y, z};
}

// ═══════════════════════════════════
//  PLAYER ANIMATION
// ═══════════════════════════════════
let walkCycle = 0;
let bouncePhase = 0;
let jumperLean = 0;
let jumperSquash = 1;
let jumperStretch = 1;

function animatePlayer(model, dt){
  const ud = model.userData;
  if(!ud.leftLeg) return;

  // Walking animation
  const speed = Math.sqrt(
    (keys['KeyW']||keys['KeyS']||keys['ArrowUp']||keys['ArrowDown']?1:0)**2 + (keys['KeyA']||keys['KeyD']||keys['ArrowLeft']||keys['ArrowRight']?1:0)**2
  );

  if(speed > 0 && !playerAirborne){
    walkCycle += dt * 8;
    ud.leftLeg.rotation.x = sin(walkCycle) * 0.4;
    ud.rightLeg.rotation.x = sin(walkCycle + PI) * 0.4;
    ud.leftArm.rotation.x = sin(walkCycle + PI) * 0.3;
    ud.rightArm.rotation.x = sin(walkCycle) * 0.3;
    // Slight torso bob
    ud.torso.position.y = 0.9 + abs(sin(walkCycle*2))*0.015;
  } else if(playerAirborne){
    // Jump pose — legs pull up
    ud.leftLeg.rotation.x = lerp(ud.leftLeg.rotation.x, 0.3, dt*8);
    ud.rightLeg.rotation.x = lerp(ud.rightLeg.rotation.x, 0.3, dt*8);
    // Arms out slightly
    ud.leftArm.rotation.x = lerp(ud.leftArm.rotation.x, -0.4, dt*6);
    ud.rightArm.rotation.x = lerp(ud.rightArm.rotation.x, -0.4, dt*6);
    ud.leftArm.rotation.z = lerp(ud.leftArm.rotation.z, -0.3, dt*6);
    ud.rightArm.rotation.z = lerp(ud.rightArm.rotation.z, 0.3, dt*6);
  } else {
    // Idle — small bounce rhythm if inside ropes
    if(insideRopes && state==='jumping'){
      bouncePhase += dt * diff.bpm/60 * PI;
      ud.leftLeg.rotation.x = sin(bouncePhase)*0.05;
      ud.rightLeg.rotation.x = sin(bouncePhase+PI)*0.05;
      ud.hips.position.y = 0.9 + sin(bouncePhase*2)*0.01;
    } else {
      ud.leftLeg.rotation.x = lerp(ud.leftLeg.rotation.x, 0, dt*5);
      ud.rightLeg.rotation.x = lerp(ud.rightLeg.rotation.x, 0, dt*5);
      ud.leftArm.rotation.x = lerp(ud.leftArm.rotation.x, 0, dt*5);
      ud.rightArm.rotation.x = lerp(ud.rightArm.rotation.x, 0, dt*5);
      ud.leftArm.rotation.z = lerp(ud.leftArm.rotation.z, 0, dt*5);
      ud.rightArm.rotation.z = lerp(ud.rightArm.rotation.z, 0, dt*5);
    }
  }

  // Squash/stretch
  jumperSquash = lerp(jumperSquash, 1, dt*6);
  jumperStretch = lerp(jumperStretch, 1, dt*6);
  model.scale.set(jumperSquash, jumperStretch, jumperSquash);
}

// ═══════════════════════════════════
//  CAMERA SYSTEM (Third-person, mouse-orbit)
// ═══════════════════════════════════
let camSmoothPos = null; // lazy init

function updateCamera(dt){
  // Mouse sensitivity
  const sensitivity = 0.0025;

  // Mouse directly controls orbit angles (no auto-follow fighting input)
  camYaw   -= mouseDX * sensitivity;
  camPitch  = clamp(camPitch - mouseDY * sensitivity, -0.3, 1.1);
  mouseDX = 0;
  mouseDY = 0;

  // Look-at target: player chest
  const lookTarget = new Vector3(
    playerPos.x,
    playerPos.y + PLAYER_HEIGHT * 0.6,
    playerPos.z
  );

  // Desired camera position: orbit behind player
  const desiredX = lookTarget.x + camDist * sin(camYaw) * cos(camPitch);
  const desiredY = lookTarget.y + camDist * sin(camPitch) + 0.5;
  const desiredZ = lookTarget.z + camDist * cos(camYaw) * cos(camPitch);

  // Clamp camera above ground
  const minCamY = 0.4;
  const dy = Math.max(desiredY, minCamY);

  const desired = new Vector3(desiredX, dy, desiredZ);

  // Smooth position with frame-rate-independent exponential damping
  if(!camSmoothPos) camSmoothPos = desired.clone();
  const smoothFactor = 1 - Math.exp(-8.0 * dt); // higher = snappier
  camSmoothPos.lerp(desired, smoothFactor);

  camera.position.copy(camSmoothPos);
  camera.lookAt(lookTarget);
}

// ═══════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════
let prevAngle1=0;

function crossedDown(prevA, curA){
  // Detect when rope crosses the downward position (angle crosses PI/2 + nPI boundary going from above to below)
  const prev = ((prevA % PI) + PI) % PI;
  const cur  = ((curA % PI) + PI) % PI;
  // Rope hits ground when sin(angle) goes from positive toward 0 crossing PI
  // More simply: detect wrap-around
  return prev > PI*0.8 && cur < PI*0.2;
}

function reset(){
  score=0; combo=0; maxCombo=0; flow=50; composure=100; accuracy=100;
  totalJ=0; perfC=0; goodC=0;
  jumpedBeat=false; beatFlash=0; graceBeats=0;
  rAngle=0; rSpeed=0;
  tangled=false; tangleProg=0; tangleWait=0;
  jdg=''; jdgTimer=0;
  gTime=0; totalTime=0;
  insideRopes=false;
  playerAirborne=false;
  playerVelY=0; playerVelX=0; playerVelZ=0;
  playerPos.set(0, 0, 5);
  playerYaw = PI;
  camYaw=0; camPitch=0.25;

  // Ropes will recompute their shape each frame from angle — no reset needed
}

function startTangle(){

  tangled = true;
  tangleProg = 0;
  tangleWait = 0;
  state = 'tangled';
  playerVelY = 0;
  playerPos.y = 0;
  playerAirborne = false;

  sfx('miss');
  combo = 0;
}

function resetFromTangle(){
  tangled = false;
  tangleProg = 0;
  tangleWait = 0;
  rAngle = 0;
  rSpeed = PI * diff.bpm / 60;
  graceBeats = GRACE_COUNT;
  jumpedBeat = false;
  state = 'freeroam';
  insideRopes = false;
  jdg = ''; jdgTimer = 0;
  $prompt.style.display = '';
  $prompt.textContent = 'Walk back to the rope zone to try again!';
  setTimeout(() => { $prompt.style.display = 'none'; }, 3000);
}

function judgeJump(){
  const beatPhase = ((rAngle % PI) + PI) % PI;
  const w = diff.win;
  // How close to the beat (0 = perfect)
  const dist = Math.min(beatPhase, PI - beatPhase) / PI;

  if(dist < w * 0.35){
    jdg = 'PERFECT'; jdgTimer = 0.6;
    score += 150 * (1 + combo*0.1);
    combo++; perfC++;
    flow = Math.min(100, flow + 5);
    composure = Math.min(100, composure + 2);
    accuracy = Math.min(100, accuracy + 3);
    sfx('perfect');
    emit3D(playerModel.position.clone().add(new Vector3(0,0.5,0)), 8, SPARK_CFG);
    beatFlash = 0.3;
  } else if(dist < w * 0.65){
    jdg = 'GOOD'; jdgTimer = 0.5;
    score += 80 * (1 + combo*0.05);
    combo++; goodC++;
    flow = Math.min(100, flow + 2);
    accuracy = Math.min(100, accuracy + 1);
    sfx('good');
    beatFlash = 0.15;
  } else {
    jdg = 'FAILED'; jdgTimer = 0.5;
    combo = 0; flow = Math.max(0, flow-15);
    composure = Math.max(0, composure-15);
    accuracy = Math.max(0, accuracy-10);
    sfx('miss');
    if(graceBeats > 0){
      graceBeats--;
    } else {
      startTangle();
    }
  }
  score = Math.round(score);
  maxCombo = Math.max(maxCombo, combo);
  totalJ++;
  jumpedBeat = true;
}

function handleMiss(){
  jdg = 'FAILED'; jdgTimer = 0.5;
  combo = 0; flow = Math.max(0, flow-20);
  composure = Math.max(0, composure-20);
  accuracy = Math.max(0, accuracy-15);
  sfx('miss');
  if(graceBeats > 0){
    graceBeats--;
  } else {
    startTangle();
  }
}

// ═══════════════════════════════════
//  UPDATE LOOP
// ═══════════════════════════════════
function update(dt){
  dt = Math.min(dt, 0.05); // cap

  // Judgment fade
  if(jdgTimer > 0){
    jdgTimer -= dt;
    $judgment.style.opacity = Math.min(1, jdgTimer*3);
    if(jdg==='PERFECT') $judgment.style.color = '#FFD700';
    else if(jdg==='GOOD') $judgment.style.color = '#2ECC71';
    else $judgment.style.color = '#E74C3C';
    $judgment.textContent = combo > 1 ? jdg + '  ' + combo + 'x' : jdg;
  } else {
    $judgment.style.opacity = 0;
  }
  beatFlash = Math.max(0, beatFlash - dt);

  // ESC to return to menu from any gameplay state
  if(pressed('Escape') && state !== 'menu'){
    if(document.pointerLockElement) document.exitPointerLock();
    showMenu();
    return;
  }

  // ── MENU ──
  if(state === 'menu'){
    document.getElementById('menuBtn').style.display = 'none';
    if(pressed('Enter') || pressed('Space')){
      renderer.domElement.requestPointerLock();
      startGame();
      startAmbience();
    }

    // Idle rope animation — uses selected difficulty BPM
    rAngle += dt * PI * diff.bpm/60;
    ropeAngle1 = rAngle;
    ropeAngle2 = rAngle + PI;

    const ep1L = getRopeEndpoint(ropeAngle1);
    const ep1R = getRopeEndpoint(ropeAngle1);
    rope1.computeShape(ropeAngle1, ep1L.y, ep1L.z, ep1R.y, ep1R.z);
    rope1.updateVisual();

    const ep2L = getRopeEndpoint(ropeAngle2);
    const ep2R = getRopeEndpoint(ropeAngle2);
    rope2.computeShape(ropeAngle2, ep2L.y, ep2L.z, ep2R.y, ep2R.z);
    rope2.updateVisual();

    // Animate turners idle
    animateTurner(turnerLModel, ropeAngle1, ropeAngle2, dt, 'L');
    animateTurner(turnerRModel, ropeAngle1, ropeAngle2, dt, 'R');

    // Slow camera orbit
    camYaw += dt * 0.15;
    const cx = camDist*2 * sin(camYaw);
    const cz = camDist*2 * cos(camYaw);
    camera.position.lerp(new Vector3(cx, 3, cz), dt*2);
    camera.lookAt(new Vector3(0, 1, 0));

    return;
  }

  // ── SCORE ──
  if(state === 'score'){
    if(pressed('Enter') || pressed('Space')){
      showMenu();
      reset();
    }
    // Keep camera
    camera.lookAt(new Vector3(0, 1, 0));
    return;
  }

  // ── TANGLED ──
  if(state === 'tangled'){
    gTime += dt; totalTime = gTime;
    tangleProg = Math.min(1, tangleProg + dt * 0.8);
    rSpeed = lerp(rSpeed, 0, 0.08);
    rAngle += rSpeed * dt;

    // Ropes droop to ground
    ropeAngle1 = rAngle;
    ropeAngle2 = rAngle + PI;
    const ep1L = getRopeEndpoint(ropeAngle1);
    rope1.computeShape(ropeAngle1, ep1L.y, ep1L.z, ep1L.y, ep1L.z);
    rope1.applyTangle(tangleProg);
    rope1.updateVisual();
    const ep2L = getRopeEndpoint(ropeAngle2);
    rope2.computeShape(ropeAngle2, ep2L.y, ep2L.z, ep2L.y, ep2L.z);
    rope2.applyTangle(tangleProg);
    rope2.updateVisual();

    // Player stumble briefly, then allow movement
    if(tangleProg < 0.5){
      jumperLean = lerp(jumperLean, 0.15, dt*2);
      if(playerModel){
        playerModel.rotation.z = jumperLean;
        playerModel.rotation.x = sin(gTime*3)*0.05*tangleProg;
      }
    } else {
      jumperLean = lerp(jumperLean, 0, dt*4);
    }

    // Allow player movement during tangle (same as freeroam)
    let inputFwd = 0, inputRight = 0;
    if(keys['KeyW'] || keys['ArrowUp'])    inputFwd  += 1;
    if(keys['KeyS'] || keys['ArrowDown'])  inputFwd  -= 1;
    if(keys['KeyA'] || keys['ArrowLeft'])  inputRight += 1;
    if(keys['KeyD'] || keys['ArrowRight']) inputRight -= 1;
    const inputLen = Math.sqrt(inputFwd*inputFwd + inputRight*inputRight);
    if(inputLen > 0.01){
      const nFwd = inputFwd / inputLen;
      const nRight = inputRight / inputLen;
      const fwdX = -sin(camYaw), fwdZ = -cos(camYaw);
      const rgtX = fwdZ, rgtZ = -fwdX;
      const worldX = nFwd * fwdX + nRight * rgtX;
      const worldZ = nFwd * fwdZ + nRight * rgtZ;
      playerVelX += worldX * PLAYER_ACCEL * dt;
      playerVelZ += worldZ * PLAYER_ACCEL * dt;
    } else {
      playerVelX -= playerVelX * PLAYER_FRICTION * dt;
      playerVelZ -= playerVelZ * PLAYER_FRICTION * dt;
    }
    const tHSpeed = Math.sqrt(playerVelX*playerVelX + playerVelZ*playerVelZ);
    if(tHSpeed > PLAYER_SPEED){ playerVelX *= PLAYER_SPEED/tHSpeed; playerVelZ *= PLAYER_SPEED/tHSpeed; }
    playerPos.x += playerVelX * dt;
    playerPos.z += playerVelZ * dt;
    if(tHSpeed > 0.3){
      const targetYaw = Math.atan2(playerVelX, playerVelZ);
      let diff2 = targetYaw - playerYaw;
      while(diff2 > PI) diff2 -= TAU;
      while(diff2 < -PI) diff2 += TAU;
      playerYaw += diff2 * Math.min(1, dt * 10);
    }
    playerPos.x = clamp(playerPos.x, -28, 28);
    playerPos.z = clamp(playerPos.z, -28, 28);
    playerVelY += GRAVITY * dt;
    playerPos.y += playerVelY * dt;
    if(playerPos.y <= 0){ playerPos.y = 0; playerVelY = 0; playerAirborne = false; }

    playerModel.position.copy(playerPos);
    playerModel.rotation.y = playerYaw;
    animatePlayer(playerModel, dt);

    // When player walks out of rope zone, reset
    const stillInZone = (Math.abs(playerPos.x) < TURNER_DIST * 0.9) && (Math.abs(playerPos.z) < 1.5);
    if(!stillInZone && tangleProg >= 0.5){
      resetFromTangle();
    }

    updateCamera(dt);
    tickParticles(dt);
    animateMarch(dt);
    animateBreakfast(dt);
    animateHopscotch(dt);
    animateJacks(dt);
    animateMarbles(dt);

    // HUD updates
    $score.textContent = score;
    $combo.textContent = '';
    return;
  }

  // ── FREEROAM / JUMPING ──
  gTime += dt; totalTime = gTime;

  // Player movement — relative to camera facing direction
  let inputFwd = 0, inputRight = 0;
  if(keys['KeyW'] || keys['ArrowUp'])    inputFwd  += 1;
  if(keys['KeyS'] || keys['ArrowDown'])  inputFwd  -= 1;
  if(keys['KeyA'] || keys['ArrowLeft'])  inputRight += 1;
  if(keys['KeyD'] || keys['ArrowRight']) inputRight -= 1;

  // Normalize diagonal input
  const inputLen = Math.sqrt(inputFwd*inputFwd + inputRight*inputRight);
  if(inputLen > 0.01){
    const nFwd = inputFwd / inputLen;
    const nRight = inputRight / inputLen;
    // Camera forward/right vectors projected onto XZ plane
    const fwdX = -sin(camYaw), fwdZ = -cos(camYaw);
    const rgtX = fwdZ,          rgtZ = -fwdX;   // perpendicular
    // World-space input direction
    const worldX = nFwd * fwdX + nRight * rgtX;
    const worldZ = nFwd * fwdZ + nRight * rgtZ;
    // Accelerate toward desired direction
    playerVelX += worldX * PLAYER_ACCEL * dt;
    playerVelZ += worldZ * PLAYER_ACCEL * dt;
  } else {
    // Friction: decelerate smoothly to stop
    playerVelX -= playerVelX * PLAYER_FRICTION * dt;
    playerVelZ -= playerVelZ * PLAYER_FRICTION * dt;
  }

  // Clamp horizontal speed
  const hSpeed = Math.sqrt(playerVelX*playerVelX + playerVelZ*playerVelZ);
  if(hSpeed > PLAYER_SPEED){
    playerVelX *= PLAYER_SPEED / hSpeed;
    playerVelZ *= PLAYER_SPEED / hSpeed;
  }

  // Apply movement
  playerPos.x += playerVelX * dt;
  playerPos.z += playerVelZ * dt;

  // Face movement direction (smooth)
  if(hSpeed > 0.3){
    const targetYaw = Math.atan2(playerVelX, playerVelZ);
    // Smooth angle interpolation
    let diff2 = targetYaw - playerYaw;
    while(diff2 > PI) diff2 -= TAU;
    while(diff2 < -PI) diff2 += TAU;
    playerYaw += diff2 * Math.min(1, dt * 10);
  }

  // Clamp to play area (extends into protest streets)
  playerPos.x = clamp(playerPos.x, -28, 28);
  playerPos.z = clamp(playerPos.z, -28, 28);

  // Object collision (cars, benches)
  for(const obs of obstacles){
    // Skip bench tops when player is above — allows landing on them
    if(obs.type === 'bench' && playerPos.y >= obs.topY - 0.1) continue;
    // AABB vs circle
    const closestX = clamp(playerPos.x, obs.minX, obs.maxX);
    const closestZ = clamp(playerPos.z, obs.minZ, obs.maxZ);
    const dx = playerPos.x - closestX;
    const dz = playerPos.z - closestZ;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if(dist < PLAYER_RADIUS){
      if(dist > 0.001){
        const push = PLAYER_RADIUS - dist;
        playerPos.x += (dx / dist) * push;
        playerPos.z += (dz / dist) * push;
      } else {
        playerPos.x += PLAYER_RADIUS;
      }
      // Kill velocity into obstacle
      const nx = dx / (dist > 0.001 ? dist : 1);
      const nz = dz / (dist > 0.001 ? dist : 1);
      const vDotN = playerVelX * nx + playerVelZ * nz;
      if(vDotN < 0){ playerVelX -= vDotN * nx; playerVelZ -= vDotN * nz; }
    }
  }

  // Static NPC collision (spectators, jazz performers, turners)
  for(let i = 0; i < staticNPCPositions.length; i++){
    const npc = staticNPCPositions[i];
    const dx = playerPos.x - npc.x;
    const dz = playerPos.z - npc.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    const minDist = PLAYER_RADIUS + npc.r;
    if(dist < minDist && dist > 0.001){
      const push = minDist - dist;
      playerPos.x += (dx / dist) * push;
      playerPos.z += (dz / dist) * push;
      const nx = dx / dist, nz = dz / dist;
      const vDotN = playerVelX * nx + playerVelZ * nz;
      if(vDotN < 0){ playerVelX -= vDotN * nx; playerVelZ -= vDotN * nz; }
    }
  }

  // Jump / gravity
  if(!playerAirborne && (pressed('Space') || (keys['Space'] && insideRopes))){
    playerVelY = JUMP_FORCE;
    playerAirborne = true;
    sfx('jump');
    jumperSquash = 1.15;
    jumperStretch = 0.88;

    if(insideRopes && state==='jumping'){
      judgeJump();
    }
  }

  playerVelY += GRAVITY * dt;
  playerPos.y += playerVelY * dt;

  // Compute effective ground (bench platforms)
  let groundLevel = 0;
  for(const obs of obstacles){
    if(obs.type === 'bench' &&
       playerPos.x >= obs.minX - 0.15 && playerPos.x <= obs.maxX + 0.15 &&
       playerPos.z >= obs.minZ - 0.15 && playerPos.z <= obs.maxZ + 0.15 &&
       playerPos.y >= obs.topY - 0.15){
      groundLevel = Math.max(groundLevel, obs.topY);
    }
  }

  if(playerPos.y <= groundLevel){
    playerPos.y = groundLevel;
    if(playerAirborne){
      playerAirborne = false;
      sfx('land');
      emit3D(playerModel.position.clone(), 4, DUST_CFG);
      jumperSquash = 0.9;
      jumperStretch = 1.12;
    }
    playerVelY = 0;
  }

  // Check if inside rope zone
  const prevInside = insideRopes;
  const distFromCenter = Math.sqrt(playerPos.x**2 + playerPos.z**2);
  insideRopes = (Math.abs(playerPos.x) < TURNER_DIST * 0.7) && (Math.abs(playerPos.z) < 1.0);

  if(!prevInside && insideRopes && state==='freeroam'){
    state = 'jumping';
    graceBeats = GRACE_COUNT;
    sfx('entry');
    $prompt.textContent = 'HOLD SPACE to jump in rhythm!';
    setTimeout(() => { $prompt.style.display = 'none'; }, 3000);
  }

  // Rope speed
  const tgtSpeed = PI * diff.bpm / 60;
  rSpeed = lerp(rSpeed, tgtSpeed, 0.06);

  // Advance rope angle
  prevAngle1 = rAngle;
  rAngle += rSpeed * dt;
  ropeAngle1 = rAngle;
  ropeAngle2 = rAngle + PI;

  // Beat detection
  if(crossedDown(prevAngle1, rAngle)){
    if(insideRopes && state==='jumping'){
      if(!jumpedBeat && graceBeats <= 0){
        handleMiss();
      }
      if(graceBeats > 0) graceBeats--;
    }
    jumpedBeat = false;
  }

  // Rope shape (compute first, then collision test against actual geometry)
  const ep1L = getRopeEndpoint(ropeAngle1);
  const ep1R = getRopeEndpoint(ropeAngle1);
  rope1.computeShape(ropeAngle1, ep1L.y, ep1L.z, ep1R.y, ep1R.z);

  const ep2L = getRopeEndpoint(ropeAngle2);
  const ep2R = getRopeEndpoint(ropeAngle2);
  rope2.computeShape(ropeAngle2, ep2L.y, ep2L.z, ep2R.y, ep2R.z);

  // Physical rope collision — only feet (lower 0.3m) trigger a tangle
  if(insideRopes && state==='jumping' && !tangled && graceBeats <= 0){
    const px = playerPos.x, py = playerPos.y, pz = playerPos.z;
    const FEET_HEIGHT = 0.3; // only check ankle/shoe zone
    const hit1 = rope1.testPlayerCollision(px, py, pz, PLAYER_BODY_RADIUS, FEET_HEIGHT);
    const hit2 = rope2.testPlayerCollision(px, py, pz, PLAYER_BODY_RADIUS, FEET_HEIGHT);
    const hit = hit1 && hit2 ? (hit1.depth >= hit2.depth ? hit1 : hit2) : (hit1 || hit2);
    const hitRope = hit === hit1 ? rope1 : rope2;

    if(hit){
      // Push rope visually at contact point (bend effect)
      const cp = hit.contactPt;
      const dx = cp.x - px;
      const dz = cp.z - pz;
      const dnorm = Math.sqrt(dx*dx + dz*dz) || 1;
      hitRope.applyContactBend(hit.segIdx, hit.t, -dx/dnorm * 0.15, -dz/dnorm * 0.15, 1.0);
      startTangle();
    }
  }

  if(tangled){ rope1.applyTangle(tangleProg); rope2.applyTangle(tangleProg); }
  rope1.updateVisual();
  rope2.updateVisual();

  // Turner anim
  animateTurner(turnerLModel, ropeAngle1, ropeAngle2, dt, 'L');
  animateTurner(turnerRModel, ropeAngle1, ropeAngle2, dt, 'R');

  // Flow decay
  flow = Math.max(0, flow - dt*2);

  // Update model
  playerModel.position.copy(playerPos);
  playerModel.rotation.y = playerYaw;
  jumperLean = lerp(jumperLean, 0, dt*5);
  playerModel.rotation.z = jumperLean;

  animatePlayer(playerModel, dt);
  // Jazz performer sway animation (tempo-synced) + music note particles
  const jazzBPM = currentJazzBPM || 80;
  const swaySpeed = PI * jazzBPM / 60;
  jazzPerformers.forEach(jp => {
    jp.time += dt;
    jp.group.rotation.z = sin(jp.time * swaySpeed) * 0.04;
    jp.group.position.y = sin(jp.time * swaySpeed * 0.5) * 0.02;
    // Emit music notes from instruments
    if(jazzPlaying){
      jp.noteTimer -= dt;
      if(jp.noteTimer <= 0){
        jp.noteTimer = rand(0.6, 1.8);
        const off = jp.noteOff;
        const wPos = new THREE.Vector3(off.x, off.y, off.z);
        jp.group.localToWorld(wPos);
        emitMusicNote(wPos);
      }
    }
  });
  tickMusicNotes(dt);
  animateMarch(dt);
  animateBreakfast(dt);
  animateHopscotch(dt);
  animateJacks(dt);
  animateMarbles(dt);
  // Proximity-based jazz volume (inverse square law outside small radius)
  if(jazzAudio){
    const pcx = -1.5, pcz = -9.55;
    const ddx = playerPos.x - pcx, ddz = playerPos.z - pcz;
    const pDist = Math.sqrt(ddx*ddx + ddz*ddz);
    const hearR = 0.9;
    let vol;
    if(pDist <= hearR){
      vol = 0.6;
    } else {
      vol = 0.6 * (hearR * hearR) / (pDist * pDist);
    }
    jazzAudio.volume = clamp(vol, 0.0, 0.6);
  }
  updateCamera(dt);
  tickParticles(dt);

  // HUD updates
  $score.textContent = score;
  $combo.textContent = combo > 1 ? combo + 'x COMBO' : '';
}

// ═══════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════
let lastTime = 0;

function gameLoop(time){
  requestAnimationFrame(gameLoop);
  const dt = Math.min((time - lastTime) / 1000, 0.1);
  lastTime = time;

  update(dt);

  // Clear just-pressed
  for(const k in jp) jp[k] = false;

  renderer.render(scene, camera);
}

// ═══════════════════════════════════
//  INIT
// ═══════════════════════════════════
buildEnvironment();
buildDistantStreet();
buildMarchGroup();
buildSpectators();
buildJazzPerformers();
buildBreakfastProgram();
buildHopscotch();
buildJacks();
buildMarbles();
registerObstacles();
initGameObjects();
showMenu();

document.getElementById('menuBtn').addEventListener('click', () => {
  if(state !== 'menu'){
    if(document.pointerLockElement) document.exitPointerLock();
    showMenu();
  }
});

requestAnimationFrame(gameLoop);

</script>
</body>
