<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Double Dutch 3D — Third-Person Simulator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;font-family:'Segoe UI',Tahoma,Geneva,Verdana,sans-serif;user-select:none}
canvas{display:block;width:100vw;height:100vh}
#hud{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10}
#hud *{pointer-events:none}
.hud-panel{position:absolute;background:rgba(0,0,0,.55);border-radius:10px;backdrop-filter:blur(4px);padding:8px 14px;color:#fff;font-size:13px}
#scorePanel{top:12px;left:12px}
#scorePanel .big{font-size:28px;font-weight:bold;color:#FFD700}
#scorePanel .combo{font-size:16px;color:#FFA500;margin-top:2px}
#flowPanel{top:12px;right:12px;width:170px}
#flowPanel .label{font-size:11px;color:#aaa;margin-bottom:3px}
#flowPanel .bar{height:14px;background:rgba(255,255,255,.12);border-radius:7px;overflow:hidden}
#flowPanel .fill{height:100%;border-radius:7px;transition:width .2s}
#diffLabel{top:12px;left:50%;transform:translateX(-50%);font-size:11px;color:#999;background:rgba(0,0,0,.35);padding:4px 14px;border-radius:6px}
#judgment{position:absolute;top:38%;left:50%;transform:translate(-50%,-50%);font-size:32px;font-weight:bold;text-shadow:0 0 15px currentColor;opacity:0;transition:opacity .15s}
#centerMsg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#fff}
#centerMsg h1{font-size:52px;text-shadow:0 0 30px rgba(255,215,0,.4)}
#centerMsg .sub{font-size:18px;color:#ccc;margin-top:8px}
#centerMsg .keys{font-size:13px;color:#888;margin-top:18px;line-height:1.8}
#centerMsg .diff{margin-top:14px;font-size:15px;color:#FFD700}
#centerMsg .diff-row{display:flex;align-items:center;justify-content:center;gap:18px;margin-top:14px}
#centerMsg .diff-arrow{font-size:32px;color:#FFD700;cursor:pointer;pointer-events:auto;opacity:0.7;transition:opacity .15s, transform .15s;user-select:none}
#centerMsg .diff-arrow:hover{opacity:1;transform:scale(1.25)}
#centerMsg .diff-label{font-size:17px;color:#FFD700;min-width:160px;text-align:center}
#timer{position:absolute;bottom:14px;right:18px;font-size:13px;color:rgba(255,255,255,.35)}
#prompt{position:absolute;bottom:50px;left:50%;transform:translateX(-50%);font-size:15px;color:rgba(255,255,255,.5);display:none}
#composure{top:76px;right:12px;width:170px}
#composure .label{font-size:11px;color:#aaa;margin-bottom:3px}
#composure .bar{height:14px;background:rgba(255,255,255,.12);border-radius:7px;overflow:hidden}
#composure .fill{height:100%;border-radius:7px;background:linear-gradient(90deg,#3498db,#2ecc71);transition:width .2s}
#accuracy{top:120px;right:12px;width:170px}
#accuracy .label{font-size:11px;color:#aaa;margin-bottom:3px}
#accuracy .bar{height:14px;background:rgba(255,255,255,.12);border-radius:7px;overflow:hidden}
#accuracy .fill{height:100%;border-radius:7px;background:linear-gradient(90deg,#9b59b6,#e74c3c);transition:width .2s}
</style>
</head>
<body>
<div id="hud">
  <div id="scorePanel" class="hud-panel" style="display:none">
    <div class="big" id="scoreVal">0</div>
    <div class="combo" id="comboVal"></div>
    <div style="font-size:11px;color:#aaa;margin-top:3px">JUMPS: <span id="jumpCount">0</span></div>
  </div>
  <div id="flowPanel" class="hud-panel" style="display:none">
    <div class="label">FLOW</div>
    <div class="bar"><div class="fill" id="flowFill" style="width:50%;background:linear-gradient(90deg,#2ecc71,#f1c40f,#e74c3c)"></div></div>
  </div>
  <div id="composure" class="hud-panel" style="display:none">
    <div class="label">COMPOSURE</div>
    <div class="bar"><div class="fill" id="compFill" style="width:100%"></div></div>
  </div>
  <div id="accuracy" class="hud-panel" style="display:none">
    <div class="label">RHYTHM ACCURACY</div>
    <div class="bar"><div class="fill" id="accFill" style="width:100%"></div></div>
  </div>
  <div id="diffLabel" class="hud-panel" style="display:none"></div>
  <div id="judgment"></div>
  <div id="timer" style="display:none"></div>
  <div id="prompt"></div>
  <div id="centerMsg">
    <h1>DOUBLE DUTCH 3D</h1>
    <div class="sub">Third-Person Rhythm &amp; Rope Simulator</div>
    <div class="diff-row">
      <span class="diff-arrow" id="diffLeft">◀</span>
      <span class="diff-label" id="diffDisplay">EASY · 75 BPM</span>
      <span class="diff-arrow" id="diffRight">▶</span>
    </div>
    <div class="keys">
      WASD / Arrows — Move &nbsp;|&nbsp; SPACE — Jump &nbsp;|&nbsp; Mouse — Look<br>
      ENTER — Start
    </div>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.163.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.163.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';

// ═══════════════════════════════════════════════════════════
//  DOUBLE DUTCH 3D — Third-Person Rhythm & Rope Simulator
//  Honoring a tradition of rhythm, community & Black culture
// ═══════════════════════════════════════════════════════════

const {Vector3, Quaternion, Euler, Color, MathUtils} = THREE;
const lerp = MathUtils.lerp;
const clamp = MathUtils.clamp;
const PI = Math.PI, TAU = PI*2;
const sin = Math.sin, cos = Math.cos, abs = Math.abs, floor = Math.floor;
const rand = (a,b) => a+Math.random()*(b-a);

// ── CONSTANTS ──
const ROPE_SEG_COUNT = 32;    // segments per rope
const ROPE_LENGTH    = 7.0;   // meters
const ROPE_THICKNESS = 0.04;
const ROPE_RADIUS    = 2.0;   // how high the rope arcs (swing radius in Y/Z)
const TURNER_DIST    = 3.5;   // distance from center to each turner
const JUMP_FORCE     = 4.8;
const GRAVITY        = -14.0;
const PLAYER_HEIGHT  = 1.7;
const PLAYER_SPEED   = 4.0;

const DIFFS = [
  {key:'practice', label:'Practice', bpm:55,  win:.24},
  {key:'easy',     label:'Easy',     bpm:75,  win:.19},
  {key:'medium',   label:'Medium',   bpm:100, win:.14},
  {key:'hard',     label:'Hard',     bpm:130, win:.09},
  {key:'expert',   label:'Expert',   bpm:160, win:.06}
];

// ── GAME STATE ──
let state = 'menu'; // menu | freeroam | jumping | tangled | score
let dIdx = 1, diff = DIFFS[dIdx];
let score=0, combo=0, maxCombo=0, flow=50, composure=100, accuracy=100;
let totalJ=0, perfC=0, goodC=0;
let jumpedBeat=false, beatFlash=0, graceBeats=0;
const GRACE_COUNT = 4;
let gTime=0, totalTime=0;
let tangled=false, tangleProg=0, tangleWait=0;
let jdg='', jdgTimer=0;
let rAngle=0, rSpeed=0;
let insideRopes=false;

// ── DOM REFS ──
const $score = document.getElementById('scoreVal');
const $combo = document.getElementById('comboVal');
const $jumps = document.getElementById('jumpCount');
const $flowFill = document.getElementById('flowFill');
const $compFill = document.getElementById('compFill');
const $accFill  = document.getElementById('accFill');
const $diffLabel = document.getElementById('diffLabel');
const $diffDisplay = document.getElementById('diffDisplay');
const $judgment = document.getElementById('judgment');
const $centerMsg = document.getElementById('centerMsg');
const $timer = document.getElementById('timer');
const $prompt = document.getElementById('prompt');

// ── INPUT ──
const keys = {};
const jp = {};
let mouseDX=0, mouseDY=0;
let pointerLocked=false;

document.addEventListener('keydown', e => {
  if(!keys[e.code]) jp[e.code]=true;
  keys[e.code]=true;
  initAudio();
  if(e.code==='Space'||e.code.startsWith('Arrow')) e.preventDefault();
});
document.addEventListener('keyup', e => { keys[e.code]=false; });
document.addEventListener('mousemove', e => {
  if(pointerLocked){
    mouseDX += e.movementX;
    mouseDY += e.movementY;
  }
});
document.addEventListener('pointerlockchange', () => {
  pointerLocked = !!document.pointerLockElement;
});

function pressed(c){ return jp[c]===true; }

// ═══════════════════════════════════
//  AUDIO (Web Audio synthesis)
// ═══════════════════════════════════
let actx=null;
function initAudio(){ if(!actx) actx=new (window.AudioContext||window.webkitAudioContext)(); }

function sfx(type, vol=1){
  if(!actx) return;
  const t=actx.currentTime;
  const g=actx.createGain();
  g.gain.value=vol*0.3;
  g.connect(actx.destination);

  if(type==='slap'){
    const sr=actx.sampleRate, n=(sr*.07)|0, buf=actx.createBuffer(1,n,sr), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(sr*.012));
    const s=actx.createBufferSource(); s.buffer=buf;
    const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=280;
    s.connect(f); f.connect(g); s.start();
    const o=actx.createOscillator(); o.frequency.value=58;
    const g2=actx.createGain(); g2.gain.setValueAtTime(vol*.15,t); g2.gain.exponentialRampToValueAtTime(.001,t+.08);
    o.connect(g2); g2.connect(actx.destination); o.start(t); o.stop(t+.08);
  } else if(type==='jump'){
    const o=actx.createOscillator(); o.type='triangle'; o.frequency.value=200;
    g.gain.setValueAtTime(vol*.08,t); g.gain.exponentialRampToValueAtTime(.001,t+.06);
    o.connect(g); o.start(t); o.stop(t+.06);
  } else if(type==='land'){
    const sr=actx.sampleRate, n=(sr*.05)|0, buf=actx.createBuffer(1,n,sr), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(sr*.01));
    const s=actx.createBufferSource(); s.buffer=buf;
    const f=actx.createBiquadFilter(); f.type='lowpass'; f.frequency.value=200;
    s.connect(f); f.connect(g); s.start();
  } else if(type==='perfect'){
    [523,659].forEach((fr,i) => {
      const o=actx.createOscillator(); o.frequency.value=fr;
      const gg=actx.createGain(); gg.gain.setValueAtTime(.12,t+i*.04);
      gg.gain.exponentialRampToValueAtTime(.001,t+i*.04+.12);
      o.connect(gg); gg.connect(actx.destination); o.start(t+i*.04); o.stop(t+i*.04+.12);
    });
  } else if(type==='good'){
    const o=actx.createOscillator(); o.type='triangle'; o.frequency.value=440;
    g.gain.setValueAtTime(.1,t); g.gain.exponentialRampToValueAtTime(.001,t+.08);
    o.connect(g); o.start(t); o.stop(t+.08);
  } else if(type==='miss'){
    const o=actx.createOscillator(); o.type='sawtooth'; o.frequency.value=140;
    g.gain.setValueAtTime(.12,t); g.gain.exponentialRampToValueAtTime(.001,t+.15);
    o.connect(g); o.start(t); o.stop(t+.15);
  } else if(type==='tangle'){
    const sr=actx.sampleRate, n=(sr*.35)|0, buf=actx.createBuffer(1,n,sr), d=buf.getChannelData(0);
    for(let i=0;i<n;i++) d[i]=(Math.random()*2-1)*Math.exp(-i/(sr*.06));
    const s=actx.createBufferSource(); s.buffer=buf;
    const f=actx.createBiquadFilter(); f.type='bandpass'; f.frequency.value=350;
    s.connect(f); f.connect(g); s.start();
    const o=actx.createOscillator(); o.frequency.value=70;
    const g3=actx.createGain(); g3.gain.setValueAtTime(.13,t); g3.gain.exponentialRampToValueAtTime(.001,t+.4);
    o.connect(g3); g3.connect(actx.destination); o.start(t); o.stop(t+.4);
  } else if(type==='entry'){
    [330,440,554].forEach((fr,i) => {
      const o=actx.createOscillator(); o.frequency.value=fr;
      const gg=actx.createGain(); gg.gain.setValueAtTime(.1,t+i*.07);
      gg.gain.exponentialRampToValueAtTime(.001,t+i*.07+.1);
      o.connect(gg); gg.connect(actx.destination); o.start(t+i*.07); o.stop(t+i*.07+.1);
    });
  } else if(type==='ambient'){
    // low city hum
    const o=actx.createOscillator(); o.type='sine'; o.frequency.value=80;
    g.gain.setValueAtTime(vol*.02,t); g.gain.linearRampToValueAtTime(0,t+2);
    o.connect(g); o.start(t); o.stop(t+2);
  }
}

// Ambient loop
let ambientInterval=null;
function startAmbience(){
  if(ambientInterval) return;
  ambientInterval = setInterval(() => { if(actx) sfx('ambient',.3); }, 3000);
}

// ═══════════════════════════════════
//  THREE.JS SETUP
// ═══════════════════════════════════
const renderer = new THREE.WebGLRenderer({antialias:true, alpha:false});
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.1;
document.body.prepend(renderer.domElement);

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x1a1830, 0.012);

const camera = new THREE.PerspectiveCamera(55, window.innerWidth/window.innerHeight, 0.1, 200);
camera.position.set(0, 3, 8);

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ── LIGHTING ── (golden hour feel)
const ambientLight = new THREE.AmbientLight(0x554433, 0.6);
scene.add(ambientLight);

const sunLight = new THREE.DirectionalLight(0xffcc88, 2.2);
sunLight.position.set(-15, 20, 10);
sunLight.castShadow = true;
sunLight.shadow.mapSize.set(2048, 2048);
sunLight.shadow.camera.left = -25;
sunLight.shadow.camera.right = 25;
sunLight.shadow.camera.top = 25;
sunLight.shadow.camera.bottom = -25;
sunLight.shadow.camera.near = 0.5;
sunLight.shadow.camera.far = 60;
sunLight.shadow.bias = -0.001;
scene.add(sunLight);

const fillLight = new THREE.DirectionalLight(0x8899cc, 0.4);
fillLight.position.set(10, 8, -5);
scene.add(fillLight);

const hemiLight = new THREE.HemisphereLight(0xdca04e, 0x383838, 0.5);
scene.add(hemiLight);

// ═══════════════════════════════════
//  MATERIALS
// ═══════════════════════════════════
function mat(color, opts={}){
  return new THREE.MeshStandardMaterial({
    color, roughness:opts.rough??0.8, metalness:opts.metal??0.0, ...opts
  });
}

const MAT = {
  blacktop:  mat(0x383838, {rough:0.95}),
  sidewalk:  mat(0x888880, {rough:0.9}),
  building:  mat(0x252535, {rough:0.85}),
  buildWin:  mat(0xffcc66, {rough:0.5, emissive:0xffcc66, emissiveIntensity:0.15}),
  fence:     mat(0x777777, {rough:0.7, metal:0.4}),
  chalk:     mat(0xffffff, {rough:1.0, transparent:true, opacity:0.12}),
  grass:     mat(0x2a4a20, {rough:0.95}),
  tree:      mat(0x1a3a14, {rough:0.9}),
  trunk:     mat(0x5a3a20, {rough:0.9}),
  car1:      mat(0x3366cc, {rough:0.3, metal:0.5}),
  car2:      mat(0xcc3333, {rough:0.3, metal:0.5}),
  car3:      mat(0x444444, {rough:0.3, metal:0.5}),
  tire:      mat(0x222222, {rough:0.9}),
  rope1:     mat(0x3498db, {rough:0.6}),
  rope2:     mat(0xe74c3c, {rough:0.6}),
  // Character materials
  jumperSkin:   mat(0xA0704C),
  jumperShirt:  mat(0xE8C616),
  jumperPants:  mat(0x2C3E50),
  jumperShoe:   mat(0x333333),
  jumperHair:   mat(0x1E1008),
  turnerLSkin:  mat(0xB07848),
  turnerLShirt: mat(0x2ECC71),
  turnerLPants: mat(0x34495E),
  turnerLHair:  mat(0x3B2317),
  turnerRSkin:  mat(0x8B6240),
  turnerRShirt: mat(0xC471ED),
  turnerRPants: mat(0x2C3E50),
  turnerRHair:  mat(0x1C1008),
  shoe:         mat(0x333333),
  shoeSole:     mat(0xeeeeee),
};

// ═══════════════════════════════════
//  ENVIRONMENT
// ═══════════════════════════════════
function buildEnvironment(){
  // Ground (blacktop court)
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(60, 60),
    MAT.blacktop
  );
  ground.rotation.x = -PI/2;
  ground.receiveShadow = true;
  scene.add(ground);

  // Court lines (chalk)
  const lineGeo = new THREE.PlaneGeometry(10, 0.06);
  for(let i=-2; i<=2; i++){
    const line = new THREE.Mesh(lineGeo, MAT.chalk);
    line.rotation.x = -PI/2;
    line.position.set(0, 0.005, i*2);
    scene.add(line);
  }
  // Cross lines
  const crossGeo = new THREE.PlaneGeometry(0.06, 10);
  for(let i=-2; i<=2; i++){
    const line = new THREE.Mesh(crossGeo, MAT.chalk);
    line.rotation.x = -PI/2;
    line.position.set(i*2, 0.005, 0);
    scene.add(line);
  }

  // Hopscotch chalk marks
  const chalkGeo = new THREE.PlaneGeometry(0.7, 0.7);
  const chalkMat = mat(0xffcccc, {rough:1, transparent:true, opacity:0.08});
  for(let i=0; i<6; i++){
    const c = new THREE.Mesh(chalkGeo, chalkMat);
    c.rotation.x = -PI/2;
    c.position.set(-6 + rand(-0.3,0.3), 0.005, -3+i*1.1);
    scene.add(c);
  }

  // Guide line between turners (shows where to jump)
  const guideMat = mat(0xFFD700, {rough:1, transparent:true, opacity:0.35, emissive:0xFFD700, emissiveIntensity:0.15});
  // Dashed line made of small rectangles
  const dashLen = 0.3, gapLen = 0.25, dashW = 0.06;
  const totalSpan = TURNER_DIST * 2;
  for(let d = -TURNER_DIST + 0.5; d < TURNER_DIST - 0.3; d += dashLen + gapLen){
    const dash = new THREE.Mesh(new THREE.PlaneGeometry(dashLen, dashW), guideMat);
    dash.rotation.x = -PI/2;
    dash.rotation.z = PI/2;
    dash.position.set(d + dashLen/2, 0.006, 0);
    scene.add(dash);
  }
  // Small diamond marker at center
  const markerMat = mat(0xFFD700, {rough:0.8, transparent:true, opacity:0.45, emissive:0xFFD700, emissiveIntensity:0.25});
  const marker = new THREE.Mesh(new THREE.PlaneGeometry(0.35, 0.35), markerMat);
  marker.rotation.x = -PI/2;
  marker.rotation.z = PI/4;  // diamond orientation
  marker.position.set(0, 0.007, 0);
  scene.add(marker);

  // Sidewalk border
  const swGeo = new THREE.BoxGeometry(70, 0.15, 4);
  [-15,15].forEach(z => {
    const sw = new THREE.Mesh(swGeo, MAT.sidewalk);
    sw.position.set(0, 0.07, z);
    sw.receiveShadow = true;
    scene.add(sw);
  });

  // Fence (chain-link style)
  buildFence(-14, -25, 25);
  buildFence(14, -25, 25);

  // Buildings (background)
  buildBuildings();

  // Parked cars
  buildCar(-10, 0, -12, 0, MAT.car1);
  buildCar(-6, 0, -12, 0.1, MAT.car2);
  buildCar(8, 0, 12, PI, MAT.car3);
  buildCar(12, 0, 12, PI+0.05, MAT.car1);

  // Trees
  for(let i=0; i<8; i++){
    const tx = rand(-25,25), tz = rand(16,22) * (i%2===0?1:-1);
    buildTree(tx, tz);
  }

  // Spectator benches/crates
  buildBench(7, 5);
  buildBench(-7, -5);

  // Skybox (gradient dome)
  buildSky();
}

function buildFence(z, xStart, xEnd){
  const postGeo = new THREE.CylinderGeometry(0.04, 0.04, 2.5, 6);
  const railGeo = new THREE.CylinderGeometry(0.02, 0.02, 1, 4);
  for(let x=xStart; x<=xEnd; x+=2){
    const post = new THREE.Mesh(postGeo, MAT.fence);
    post.position.set(x, 1.25, z);
    post.castShadow = true;
    scene.add(post);
  }
  // Top rail
  const topRail = new THREE.Mesh(
    new THREE.CylinderGeometry(0.025, 0.025, xEnd-xStart, 8),
    MAT.fence
  );
  topRail.position.set((xStart+xEnd)/2, 2.5, z);
  topRail.rotation.z = PI/2;
  scene.add(topRail);

  // Diamond mesh (simplified)
  const meshMat = mat(0x777777, {rough:0.7, metal:0.3, transparent:true, opacity:0.15, wireframe:true});
  const meshGeo = new THREE.PlaneGeometry(xEnd-xStart, 2.3, (xEnd-xStart)*2, 10);
  const mesh = new THREE.Mesh(meshGeo, meshMat);
  mesh.position.set((xStart+xEnd)/2, 1.35, z);
  if(z>0) mesh.rotation.y = PI;
  scene.add(mesh);
}

function buildBuildings(){
  const builds = [
    {x:-20, z:-22, w:6, h:12, d:5},
    {x:-12, z:-24, w:5, h:8, d:4},
    {x:-4, z:-26, w:7, h:15, d:6},
    {x:6, z:-23, w:8, h:10, d:5},
    {x:16, z:-25, w:6, h:18, d:5},
    {x:-18, z:22, w:7, h:9, d:5},
    {x:-8, z:25, w:10, h:14, d:6},
    {x:5, z:24, w:6, h:11, d:5},
    {x:14, z:23, w:8, h:16, d:5},
  ];
  builds.forEach(b => {
    const geo = new THREE.BoxGeometry(b.w, b.h, b.d);
    const bldg = new THREE.Mesh(geo, MAT.building);
    bldg.position.set(b.x, b.h/2, b.z);
    bldg.castShadow = true;
    bldg.receiveShadow = true;
    scene.add(bldg);

    // Windows
    const winGeo = new THREE.PlaneGeometry(0.5, 0.7);

  const skyMat = new THREE.ShaderMaterial({
    side: THREE.BackSide,
    uniforms: {},
    vertexShader: `
      varying vec3 vPos;
      void main(){
        vPos = position;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      varying vec3 vPos;
      void main(){
        float h = normalize(vPos).y;
        vec3 low  = vec3(0.93, 0.77, 0.47);  // golden
        vec3 mid  = vec3(0.71, 0.35, 0.18);  // orange
        vec3 high = vec3(0.15, 0.09, 0.19);  // deep purple
        vec3 col = mix(low, mid, smoothstep(0.0, 0.3, h));
        col = mix(col, high, smoothstep(0.3, 0.8, h));
        gl_FragColor = vec4(col, 1.0);
      }
    `
  });
  const sky = new THREE.Mesh(skyGeo, skyMat);
  scene.add(sky);
}

// ═══════════════════════════════════
//  ROPE SYSTEM (Parametric arc, like the 2D game but in 3D)
//  Each rope traces a curved arc driven by a rotation angle.
//  At the endpoints the rope follows a small wrist circle;
//  in the middle the full swing envelope takes over.
// ═══════════════════════════════════
class PhysicsRope {
  constructor(color, phaseOffset){
    this.segCount = ROPE_SEG_COUNT;
    this.phaseOffset = phaseOffset;
    this.groundY = 0.005;
    this.wasOnGround = false;
    this.angle = 0;

    // Store computed 3D positions
    this.points = [];
    for(let i=0; i<=this.segCount; i++){
      this.points.push(new Vector3());
    }

    // visual
    this.meshes = [];
    this.ropeMat = color===1 ? MAT.rope1 : MAT.rope2;
    this.buildVisual();
  }

  buildVisual(){
    // Use thin cylinders for each segment
    const segLen = (TURNER_DIST*2) / this.segCount;
    const geo = new THREE.CylinderGeometry(ROPE_THICKNESS, ROPE_THICKNESS, segLen*1.15, 5, 1);
    geo.rotateX(PI/2);
    for(let i=0; i<this.segCount; i++){
      const mesh = new THREE.Mesh(geo, this.ropeMat);
      mesh.castShadow = true;
      scene.add(mesh);
      this.meshes.push(mesh);
    }
  }

  // Compute the parametric rope shape for a given angle.
  // This mirrors the 2D game's ropePoints() — the envelope sin(PI*t)
  // creates the curved jump-rope arc. The angle drives the vertical
  // (y) and depth (z) components.
  computeShape(angle, handLY, handLZ, handRY, handRZ){
    this.angle = angle;
    const SAG = 0.08; // natural sag in the middle (meters)

    for(let i=0; i<=this.segCount; i++){
      const t = i / this.segCount;
      const x = lerp(-TURNER_DIST, TURNER_DIST, t);

      // Envelope: 0 at endpoints, 1 at center (like sin(PI*t))
      const env = sin(PI * t);

      // Blend: at endpoints (env≈0) → small wrist up/down pump,
      //        at center (env≈1) → full ROPE_RADIUS arc.
      // Hands pump vertically; the rope itself swings in the full arc.
      const yDisp = ROPE_RADIUS * sin(angle) * env + WRIST_RADIUS * sin(angle) * (1 - env);
      let y = HAND_HEIGHT + yDisp + SAG * env;

      const zDisp = ROPE_RADIUS * cos(angle) * env + WRIST_RADIUS * 0.12 * cos(angle) * (1 - env);
      let z = zDisp;

      // Ground collision — rope can't go below ground
      const onGround = y < this.groundY + 0.01;
      if(y < this.groundY) y = this.groundY;

      this.points[i].set(x, y, z);
    }

    // Ground slap detection — check the lowest point near center
    let lowestMidY = 999;
    for(let i=Math.floor(this.segCount*0.3); i<=Math.ceil(this.segCount*0.7); i++){
      lowestMidY = Math.min(lowestMidY, this.points[i].y);
    }
    const onGround = lowestMidY < 0.04;
    if(onGround && !this.wasOnGround){
      sfx('slap', 0.8);
    }
    this.wasOnGround = onGround;
  }

  // For tangle: distort the shape toward the center/ground
  applyTangle(tangleProg){
    const centerIdx = Math.floor(this.segCount * 0.5);
    for(let i=1; i<this.segCount; i++){
      const d = Math.abs(i - centerIdx) / this.segCount;
      const inf = Math.max(0, 1-d*3) * tangleProg;
      const p = this.points[i];
      p.y = lerp(p.y, 0.05, inf * 0.15);
      p.z = lerp(p.z, 0, inf * 0.1);
      // Add some random wobble
      p.x += sin(i*5 + tangleProg*10) * 0.02 * tangleProg;
    }
  }

  updateVisual(){
    for(let i=0; i<this.segCount; i++){
      const a = this.points[i];
      const b = this.points[i+1];
      const mid = new Vector3().addVectors(a, b).multiplyScalar(0.5);
      this.meshes[i].position.copy(mid);
      // Orient the cylinder towards the next point
      const dir = new Vector3().subVectors(b, a);
      const len = dir.length();
      if(len > 0.001){
        this.meshes[i].lookAt(b);
        this.meshes[i].scale.set(1, 1, len / ((TURNER_DIST*2)/this.segCount * 1.15) );
      }
    }
  }

  getMinYNearCenter(halfWidth=0.5){
    let minY = 999;
    for(let i=0; i<=this.segCount; i++){
      if(Math.abs(this.points[i].x) < halfWidth){
        minY = Math.min(minY, this.points[i].y);
      }
    }
    return minY;
  }

  dispose(){
    this.meshes.forEach(m => { scene.remove(m); m.geometry.dispose(); });
    this.meshes = [];
  }
}

const particles = [];
const particleGeo = new THREE.SphereGeometry(0.04, 4, 4);

function emit3D(pos, count, cfg){
  for(let i=0; i<count; i++){
    const pMat = mat(cfg.colors[floor(Math.random()*cfg.colors.length)], {transparent:true});
    const mesh = new THREE.Mesh(particleGeo, pMat);
    mesh.position.copy(pos);
    mesh.scale.setScalar(rand(cfg.rMin||0.5, cfg.rMax||1.5));
    scene.add(mesh);
    particles.push({
      mesh,
      vx: rand(cfg.vxMin||-1, cfg.vxMax||1),
      vy: rand(cfg.vyMin||1, cfg.vyMax||4),
      vz: rand(cfg.vzMin||-1, cfg.vzMax||1),
      life: 1,
      decay: rand(cfg.decayMin||0.02, cfg.decayMax||0.05),
      grav: cfg.grav || -6
    });
  }
}

function tickParticles(dt){
  for(let i=particles.length-1; i>=0; i--){
    const p = particles[i];
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.mesh.position.z += p.vz * dt;
    p.vy += p.grav * dt;
    p.life -= p.decay;
    p.mesh.material.opacity = p.life;
    p.mesh.scale.setScalar(p.life);
    if(p.life <= 0){
      scene.remove(p.mesh);
      p.mesh.geometry?.dispose();
      p.mesh.material?.dispose();
      particles.splice(i, 1);
    }
  }
}

// ═══════════════════════════════════
//  TURNER ANIMATION  (IK — hands track rope endpoints)
// ═══════════════════════════════════
const WRIST_RADIUS = 0.35; // small wrist circle at rope endpoints
const HAND_HEIGHT  = 1.5;  // height of the rope attachment on turners

// Arm segment lengths (must match buildCharacterModel)
const UPPER_ARM_LEN = 0.35;
const FOREARM_LEN   = 0.32;  // forearm mesh 0.3 + hand offset
const TOTAL_ARM_LEN = UPPER_ARM_LEN + FOREARM_LEN;

function animateTurner(model, angle1, angle2, dt, side){
  const ud = model.userData;
  if(!ud.leftArm || !ud.rightArm) return;

  // Which arm holds which rope
  const arm1 = (side==='L') ? ud.rightArm : ud.leftArm;   // rope1
  const arm2 = (side==='L') ? ud.leftArm  : ud.rightArm;  // rope2
  const fore1 = arm1.children[1];
  const fore2 = arm2.children[1];

  // Get the actual rope endpoint positions that each hand must follow
  const ep1 = getRopeEndpoint(angle1);
  const ep2 = getRopeEndpoint(angle2);

  // Shoulder world Y (torso 0.9 + shoulders 0.55)
  const shoulderY = 1.45;

  function aimArmToRope(arm, forearm, ep, armSideSign){
    // ep.y = world Y of the rope endpoint this hand grips
    // ep.z = world Z offset (very small, mostly 0)
    //
    // We need the arm to reach from the shoulder to the rope endpoint
    // while staying IN FRONT of the body (never going behind).
    //
    // dy = how far below/above the shoulder (negative = below)
    // The arm hangs at the shoulder and rotates in X to reach the target.
    
    const dy = ep.y - shoulderY;  // range: about -0.3 to +0.4
    const dz = ep.z;              // very small forward offset

    // How far the hand needs to reach (in the vertical plane in front of body)
    // We keep a constant forward reach so the arm stays in front.
    const forwardReach = 0.2; // always reach slightly forward
    const totalDz = forwardReach + dz;

    // Arm pitch: atan2 maps the vertical offset to an angle
    // When dy < 0 (below shoulder): arm angles down-forward
    // When dy > 0 (above shoulder): arm angles up-forward
    // The arm starts pointing down (rotation.x = 0), negative X = forward/up
    const targetAngle = Math.atan2(totalDz, -dy);
    // Clamp so arm stays in front: between -1.8 (forward-down) and -0.4 (forward-up)
    const armPitch = clamp(-(PI/2) + targetAngle, -1.8, -0.3);

    arm.rotation.x = armPitch;
    arm.rotation.z = armSideSign * -0.2; // slight outward spread

    // Forearm: bend to fine-tune reaching the exact endpoint
    // More bent when reaching far down, straighter when up
    if(forearm){
      const t = (dy + 0.35) / 0.7; // normalize dy to 0..1 range
      const bend = lerp(-0.5, -0.2, clamp(t, 0, 1));
      forearm.rotation.x = bend;
    }
  }

  const outerSign = (side==='L') ? 0.15 : -0.15;
  const innerSign = (side==='L') ? -0.15 : 0.15;

  aimArmToRope(arm1, fore1, ep1, outerSign);
  aimArmToRope(arm2, fore2, ep2, innerSign);

  // Slight body sway
  ud.torso.rotation.z = sin(angle1*0.5)*0.02;
}

function getRopeEndpoint(angle, height=HAND_HEIGHT){
  // Real Double Dutch: hands pump up and down, not in a full circle.
  // Vertical (Y) is the primary motion; forward/back (Z) is very subtle.
  const y = height + WRIST_RADIUS * sin(angle);
  const z = WRIST_RADIUS * 0.12 * cos(angle);  // barely any depth motion
  return {y, z};
}

// ═══════════════════════════════════
//  PLAYER ANIMATION
// ═══════════════════════════════════
let walkCycle = 0;
let bouncePhase = 0;
let jumperLean = 0;
let jumperSquash = 1;
let jumperStretch = 1;

function animatePlayer(model, dt){
  const ud = model.userData;
  if(!ud.leftLeg) return;

  // Walking animation
  const speed = Math.sqrt(
    (keys['KeyW']||keys['KeyS']||keys['ArrowUp']||keys['ArrowDown']?1:0)**2 + (keys['KeyA']||keys['KeyD']||keys['ArrowLeft']||keys['ArrowRight']?1:0)**2
  );

  if(speed > 0 && !playerAirborne){
    walkCycle += dt * 8;
    ud.leftLeg.rotation.x = sin(walkCycle) * 0.4;
    ud.rightLeg.rotation.x = sin(walkCycle + PI) * 0.4;
    ud.leftArm.rotation.x = sin(walkCycle + PI) * 0.3;
    ud.rightArm.rotation.x = sin(walkCycle) * 0.3;
    // Slight torso bob
    ud.torso.position.y = 0.9 + abs(sin(walkCycle*2))*0.015;
  } else if(playerAirborne){
    // Jump pose — legs pull up
    ud.leftLeg.rotation.x = lerp(ud.leftLeg.rotation.x, 0.3, dt*8);
    ud.rightLeg.rotation.x = lerp(ud.rightLeg.rotation.x, 0.3, dt*8);
    // Arms out slightly
    ud.leftArm.rotation.x = lerp(ud.leftArm.rotation.x, -0.4, dt*6);
    ud.rightArm.rotation.x = lerp(ud.rightArm.rotation.x, -0.4, dt*6);
    ud.leftArm.rotation.z = lerp(ud.leftArm.rotation.z, -0.3, dt*6);
    ud.rightArm.rotation.z = lerp(ud.rightArm.rotation.z, 0.3, dt*6);
  } else {
    // Idle — small bounce rhythm if inside ropes
    if(insideRopes && state==='jumping'){
      bouncePhase += dt * diff.bpm/60 * PI;
      ud.leftLeg.rotation.x = sin(bouncePhase)*0.05;
      ud.rightLeg.rotation.x = sin(bouncePhase+PI)*0.05;
      ud.hips.position.y = 0.9 + sin(bouncePhase*2)*0.01;
    } else {
      ud.leftLeg.rotation.x = lerp(ud.leftLeg.rotation.x, 0, dt*5);
      ud.rightLeg.rotation.x = lerp(ud.rightLeg.rotation.x, 0, dt*5);
      ud.leftArm.rotation.x = lerp(ud.leftArm.rotation.x, 0, dt*5);
      ud.rightArm.rotation.x = lerp(ud.rightArm.rotation.x, 0, dt*5);
      ud.leftArm.rotation.z = lerp(ud.leftArm.rotation.z, 0, dt*5);
      ud.rightArm.rotation.z = lerp(ud.rightArm.rotation.z, 0, dt*5);
    }
  }

  // Squash/stretch
  jumperSquash = lerp(jumperSquash, 1, dt*6);
  jumperStretch = lerp(jumperStretch, 1, dt*6);
  model.scale.set(jumperSquash, jumperStretch, jumperSquash);
}

// ═══════════════════════════════════
//  CAMERA SYSTEM (Third-person GTA-style)
// ═══════════════════════════════════
function updateCamera(dt){
  // Camera follows behind the player's facing direction.
  // Mouse offsets the view temporarily, but it springs back.
  const sensitivity = 0.003;
  const mouseOffsetX = mouseDX * sensitivity;
  const mouseOffsetY = mouseDY * sensitivity;
  mouseDX = 0;
  mouseDY = 0;

  // Target camYaw = behind the player (playerYaw + PI)
  let targetCamYaw = playerYaw + PI;

  // Allow mouse to offset, but smoothly return
  camYaw -= mouseOffsetX;

  // Smooth yaw follow — damped spring that slows down on big angle diffs
  let yawDiff = targetCamYaw - camYaw;
  while(yawDiff > PI) yawDiff -= TAU;
  while(yawDiff < -PI) yawDiff += TAU;
  // Use a soft exponential ease: large diffs → slow proportional catch-up
  const yawSpeed = 1.8;  // lower = smoother/slower follow
  camYaw += yawDiff * (1 - Math.exp(-yawSpeed * dt));

  camPitch = clamp(camPitch - mouseOffsetY, -0.4, 1.2);

  // Camera position: smooth follow with damped lerp
  const target = new Vector3().copy(playerPos);
  target.y += PLAYER_HEIGHT * 0.65; // look at chest height

  const cx = target.x + camDist * sin(camYaw) * cos(camPitch);
  const cy = target.y + camDist * sin(camPitch);
  const cz = target.z + camDist * cos(camYaw) * cos(camPitch);

  // Exponential smoothing for position (frame-rate independent)
  const posSmooth = 1 - Math.exp(-4.5 * dt);
  camera.position.lerp(new Vector3(cx, cy, cz), posSmooth);
  camera.lookAt(target);
}

// ═══════════════════════════════════
//  GAME LOGIC
// ═══════════════════════════════════
let prevAngle1=0;

function crossedDown(prevA, curA){
  // Detect when rope crosses the downward position (angle crosses PI/2 + nPI boundary going from above to below)
  const prev = ((prevA % PI) + PI) % PI;
  const cur  = ((curA % PI) + PI) % PI;
  // Rope hits ground when sin(angle) goes from positive toward 0 crossing PI
  // More simply: detect wrap-around
  return prev > PI*0.8 && cur < PI*0.2;
}

function reset(){
  score=0; combo=0; maxCombo=0; flow=50; composure=100; accuracy=100;
  totalJ=0; perfC=0; goodC=0;
  jumpedBeat=false; beatFlash=0; graceBeats=0;
  rAngle=0; rSpeed=0;
  tangled=false; tangleProg=0; tangleWait=0;
  jdg=''; jdgTimer=0;
  gTime=0; totalTime=0;
  insideRopes=false;
  playerAirborne=false;
  playerVelY=0; playerVelX=0; playerVelZ=0;
  playerPos.set(0, 0, 5);
  playerYaw = PI;
  camYaw=0; camPitch=0.25;

  // Ropes will recompute their shape each frame from angle — no reset needed
}

function startGame(){
  reset();
  state = 'freeroam';
  $centerMsg.style.display = 'none';
  ['scorePanel','flowPanel','composure','accuracy','diffLabel','timer'].forEach(
    id => document.getElementById(id).style.display=''
  );
  $diffLabel.textContent = diff.label.toUpperCase()+' · '+diff.bpm+' BPM';
  $prompt.style.display = '';
  $prompt.textContent = 'Walk to the rope zone and press SPACE to begin jumping';
  rSpeed = PI * diff.bpm / 60; // rad/s
}

function startTangle(){
  if(tangled) return;
  tangled = true;
  tangleProg = 0;
  tangleWait = 0;
  state = 'tangled';
  sfx('tangle');
  sfx('miss');
  composure = Math.max(0, composure-30);
}

function judgeJump(){
  const beatPhase = ((rAngle % PI) + PI) % PI;
  const w = diff.win;
  // How close to the beat (0 = perfect)
  const dist = Math.min(beatPhase, PI - beatPhase) / PI;

  if(dist < w * 0.35){
    jdg = 'PERFECT'; jdgTimer = 0.6;
    score += 150 * (1 + combo*0.1);
    combo++; perfC++;
    flow = Math.min(100, flow + 5);
    composure = Math.min(100, composure + 2);
    accuracy = Math.min(100, accuracy + 3);
    sfx('perfect');
    emit3D(playerModel.position.clone().add(new Vector3(0,0.5,0)), 8, SPARK_CFG);
    beatFlash = 0.3;
  } else if(dist < w * 0.65){
    jdg = 'GOOD'; jdgTimer = 0.5;
    score += 80 * (1 + combo*0.05);
    combo++; goodC++;
    flow = Math.min(100, flow + 2);
    accuracy = Math.min(100, accuracy + 1);
    sfx('good');
    beatFlash = 0.15;
  } else {
    jdg = 'FAILED'; jdgTimer = 0.5;
    combo = 0; flow = Math.max(0, flow-15);
    composure = Math.max(0, composure-15);
    accuracy = Math.max(0, accuracy-10);
    sfx('miss');
    if(graceBeats > 0){
      graceBeats--;
    } else {
      startTangle();
    }
  }
  score = Math.round(score);
  maxCombo = Math.max(maxCombo, combo);
  totalJ++;
  jumpedBeat = true;
}

function handleMiss(){
  jdg = 'FAILED'; jdgTimer = 0.5;
  combo = 0; flow = Math.max(0, flow-20);
  composure = Math.max(0, composure-20);
  accuracy = Math.max(0, accuracy-15);
  sfx('miss');
  if(graceBeats > 0){
    graceBeats--;
  } else {
    startTangle();
  }
}

function showScoreScreen(){
  state = 'score';
  const pct = totalJ>0 ? Math.round(((perfC+goodC)/totalJ)*100) : 0;
  const m = floor(totalTime/60), s = floor(totalTime%60);
  $centerMsg.innerHTML = `
    <h1 style="font-size:36px;color:#FFD700">TANGLED!</h1>
    <div class="sub" style="margin-top:14px">
      <div style="font-size:28px;color:#FFD700">${score}</div>
      <div style="font-size:14px;color:#aaa;margin-top:6px">POINTS</div>
    </div>
    <div style="margin-top:18px;font-size:14px;color:#ccc;line-height:2">
      Jumps: ${totalJ} &nbsp;|&nbsp; Perfect: ${perfC} &nbsp;|&nbsp; Good: ${goodC}<br>
      Max Combo: ${maxCombo} &nbsp;|&nbsp; Accuracy: ${pct}%<br>
      Time: ${m}:${s<10?'0':''}${s}
    </div>
    <div class="keys" style="margin-top:20px">Press ENTER to return to menu</div>
  `;
  $centerMsg.style.display = '';
  ['scorePanel','flowPanel','composure','accuracy','diffLabel','timer','prompt'].forEach(
    id => { const el=document.getElementById(id); if(el) el.style.display='none'; }
  );
}

function showMenu(){
  state = 'menu';
  $centerMsg.innerHTML = `
    <h1>DOUBLE DUTCH 3D</h1>
    <div class="sub">Third-Person Rhythm &amp; Rope Simulator</div>
    <div class="diff-row">
      <span class="diff-arrow" id="diffLeft">◀</span>
      <span class="diff-label" id="diffDisplay">${diff.label.toUpperCase()} · ${diff.bpm} BPM</span>
      <span class="diff-arrow" id="diffRight">▶</span>
    </div>
    <div class="keys">
      WASD / Arrows — Move &nbsp;|&nbsp; SPACE — Jump &nbsp;|&nbsp; Mouse — Look<br>
      Click arrows or ↑↓ to change difficulty &nbsp;|&nbsp; ENTER — Start
    </div>
  `;
  bindDiffArrows();
  $centerMsg.style.display = '';
  $prompt.style.display = 'none';
  ['scorePanel','flowPanel','composure','accuracy','diffLabel','timer'].forEach(
    id => document.getElementById(id).style.display='none'
  );
}

function updateDiffDisplay(){
  const dd = document.getElementById('diffDisplay');
  if(dd) dd.textContent = diff.label.toUpperCase() + ' \u00b7 ' + diff.bpm + ' BPM';
}

function changeDiff(delta){
  dIdx = clamp(dIdx + delta, 0, DIFFS.length - 1);
  diff = DIFFS[dIdx];
  updateDiffDisplay();
  initAudio();
}

function bindDiffArrows(){
  const leftBtn = document.getElementById('diffLeft');
  const rightBtn = document.getElementById('diffRight');
  if(leftBtn) leftBtn.addEventListener('click', e => { e.stopPropagation(); changeDiff(-1); });
  if(rightBtn) rightBtn.addEventListener('click', e => { e.stopPropagation(); changeDiff(1); });
}

// ═══════════════════════════════════
//  UPDATE LOOP
// ═══════════════════════════════════
function update(dt){
  dt = Math.min(dt, 0.05); // cap

  // Judgment fade
  if(jdgTimer > 0){
    jdgTimer -= dt;
    $judgment.style.opacity = Math.min(1, jdgTimer*3);
    if(jdg==='PERFECT') $judgment.style.color = '#FFD700';
    else if(jdg==='GOOD') $judgment.style.color = '#2ECC71';
    else $judgment.style.color = '#E74C3C';
    $judgment.textContent = jdg;
  } else {
    $judgment.style.opacity = 0;
  }
  beatFlash = Math.max(0, beatFlash - dt);

  // ── MENU ──
  if(state === 'menu'){
    // Difficulty selection (keyboard)
    if(pressed('ArrowUp'))   changeDiff(1);
    if(pressed('ArrowDown')) changeDiff(-1);
    if(pressed('Enter') || pressed('Space')){
      renderer.domElement.requestPointerLock();
      startGame();
      startAmbience();
    }

    // Idle rope animation — uses selected difficulty BPM
    rAngle += dt * PI * diff.bpm/60;
    ropeAngle1 = rAngle;
    ropeAngle2 = rAngle + PI;

    const ep1L = getRopeEndpoint(ropeAngle1);
    const ep1R = getRopeEndpoint(ropeAngle1);
    rope1.computeShape(ropeAngle1, ep1L.y, ep1L.z, ep1R.y, ep1R.z);
    rope1.updateVisual();

    const ep2L = getRopeEndpoint(ropeAngle2);
    const ep2R = getRopeEndpoint(ropeAngle2);
    rope2.computeShape(ropeAngle2, ep2L.y, ep2L.z, ep2R.y, ep2R.z);
    rope2.updateVisual();

    // Animate turners idle
    animateTurner(turnerLModel, ropeAngle1, ropeAngle2, dt, 'L');
    animateTurner(turnerRModel, ropeAngle1, ropeAngle2, dt, 'R');

    // Slow camera orbit
    camYaw += dt * 0.15;
    const cx = camDist*2 * sin(camYaw);
    const cz = camDist*2 * cos(camYaw);
    camera.position.lerp(new Vector3(cx, 3, cz), dt*2);
    camera.lookAt(new Vector3(0, 1, 0));

    return;
  }

  // ── SCORE ──
  if(state === 'score'){
    if(pressed('Enter') || pressed('Space')){
      showMenu();
      reset();
    }
    // Keep camera
    camera.lookAt(new Vector3(0, 1, 0));
    return;
  }

  // ── TANGLED ──
  if(state === 'tangled'){
    gTime += dt; totalTime = gTime;
    tangleProg = Math.min(1, tangleProg + dt*1.2);
    rSpeed = lerp(rSpeed, 0, 0.06);
    rAngle += rSpeed * dt;

    // Update ropes with tangle
    ropeAngle1 = rAngle;
    ropeAngle2 = rAngle + PI;
    const ep1L = getRopeEndpoint(ropeAngle1);
    rope1.computeShape(ropeAngle1, ep1L.y, ep1L.z, ep1L.y, ep1L.z);
    rope1.applyTangle(tangleProg);
    rope1.updateVisual();
    const ep2L = getRopeEndpoint(ropeAngle2);
    rope2.computeShape(ropeAngle2, ep2L.y, ep2L.z, ep2L.y, ep2L.z);
    rope2.applyTangle(tangleProg);
    rope2.updateVisual();

    // Player stumble animation
    jumperLean = lerp(jumperLean, 0.15, dt*2);
    if(playerModel){
      playerModel.rotation.z = jumperLean;
      playerModel.rotation.x = sin(gTime*3)*0.05*tangleProg;
    }

    if(pressed('Space')){ showScoreScreen(); return; }
    if(tangleProg >= 1){
      tangleWait += dt;
      if(tangleWait > 2){ showScoreScreen(); }
    }

    updateCamera(dt);
    tickParticles(dt);
    return;
  }

  // ── FREEROAM / JUMPING ──
  gTime += dt; totalTime = gTime;

  // Player movement — relative to camera facing direction
  let inputFwd = 0, inputRight = 0;
  if(keys['KeyW'] || keys['ArrowUp'])    inputFwd  += 1;
  if(keys['KeyS'] || keys['ArrowDown'])  inputFwd  -= 1;
  if(keys['KeyA'] || keys['ArrowLeft'])  inputRight += 1;
  if(keys['KeyD'] || keys['ArrowRight']) inputRight -= 1;

  // Normalize diagonal input
  const inputLen = Math.sqrt(inputFwd*inputFwd + inputRight*inputRight);
  if(inputLen > 0.01){
    const nFwd = inputFwd / inputLen;
    const nRight = inputRight / inputLen;
    // Camera forward/right vectors projected onto XZ plane
    const fwdX = -sin(camYaw), fwdZ = -cos(camYaw);
    const rgtX = fwdZ,          rgtZ = -fwdX;   // perpendicular
    // World-space input direction
    const worldX = nFwd * fwdX + nRight * rgtX;
    const worldZ = nFwd * fwdZ + nRight * rgtZ;
    // Accelerate toward desired direction
    playerVelX += worldX * PLAYER_ACCEL * dt;
    playerVelZ += worldZ * PLAYER_ACCEL * dt;
  } else {
    // Friction: decelerate smoothly to stop
    playerVelX -= playerVelX * PLAYER_FRICTION * dt;
    playerVelZ -= playerVelZ * PLAYER_FRICTION * dt;
  }

  // Clamp horizontal speed
  const hSpeed = Math.sqrt(playerVelX*playerVelX + playerVelZ*playerVelZ);
  if(hSpeed > PLAYER_SPEED){
    playerVelX *= PLAYER_SPEED / hSpeed;
    playerVelZ *= PLAYER_SPEED / hSpeed;
  }

  // Apply movement
  playerPos.x += playerVelX * dt;
  playerPos.z += playerVelZ * dt;

  // Face movement direction (smooth)
  if(hSpeed > 0.3){
    const targetYaw = Math.atan2(playerVelX, playerVelZ);
    // Smooth angle interpolation
    let diff2 = targetYaw - playerYaw;
    while(diff2 > PI) diff2 -= TAU;
    while(diff2 < -PI) diff2 += TAU;
    playerYaw += diff2 * Math.min(1, dt * 10);
  }

  // Clamp to play area
  playerPos.x = clamp(playerPos.x, -20, 20);
  playerPos.z = clamp(playerPos.z, -20, 20);

  // Jump / gravity
  if(!playerAirborne && (pressed('Space') || (keys['Space'] && insideRopes))){
    playerVelY = JUMP_FORCE;
    playerAirborne = true;
    sfx('jump');
    jumperSquash = 1.15;
    jumperStretch = 0.88;

    if(insideRopes && state==='jumping'){
      judgeJump();
    }
  }

  playerVelY += GRAVITY * dt;
  playerPos.y += playerVelY * dt;

  if(playerPos.y <= 0){
    playerPos.y = 0;
    if(playerAirborne){
      playerAirborne = false;
      sfx('land');
      emit3D(playerModel.position.clone(), 4, DUST_CFG);
      jumperSquash = 0.9;
      jumperStretch = 1.12;
    }
    playerVelY = 0;
  }

  // Check if inside rope zone
  const prevInside = insideRopes;
  const distFromCenter = Math.sqrt(playerPos.x**2 + playerPos.z**2);
  insideRopes = (Math.abs(playerPos.x) < TURNER_DIST * 0.7) && (Math.abs(playerPos.z) < 1.0);

  if(!prevInside && insideRopes && state==='freeroam'){
    state = 'jumping';
    graceBeats = GRACE_COUNT;
    sfx('entry');
    $prompt.textContent = 'HOLD SPACE to jump in rhythm!';
    setTimeout(() => { $prompt.style.display = 'none'; }, 3000);
  }

  // Rope speed
  const tgtSpeed = PI * diff.bpm / 60;
  rSpeed = lerp(rSpeed, tgtSpeed, 0.06);

  // Advance rope angle
  prevAngle1 = rAngle;
  rAngle += rSpeed * dt;
  ropeAngle1 = rAngle;
  ropeAngle2 = rAngle + PI;

  // Beat detection
  if(crossedDown(prevAngle1, rAngle)){
    if(insideRopes && state==='jumping'){
      if(!jumpedBeat && graceBeats <= 0){
        handleMiss();
      }
      if(graceBeats > 0) graceBeats--;
    }
    jumpedBeat = false;
  }

  // Rope collision check (when jumping inside) — forgiving thresholds
  if(insideRopes && state==='jumping' && !tangled){
    const r1min = rope1.getMinYNearCenter(0.4);
    const r2min = rope2.getMinYNearCenter(0.4);
    const feetY = playerPos.y + 0.02;

    // Only trigger if rope is very close to ground AND feet are below rope
    if((r1min < 0.12 && feetY < r1min + 0.05) || (r2min < 0.12 && feetY < r2min + 0.05)){
      if(!playerAirborne && graceBeats <= 0){
        // Standing on the rope = tangle
        startTangle();
      }
    }
  }

  // Rope shape
  const ep1L = getRopeEndpoint(ropeAngle1);
  const ep1R = getRopeEndpoint(ropeAngle1);
  rope1.computeShape(ropeAngle1, ep1L.y, ep1L.z, ep1R.y, ep1R.z);
  if(tangled) rope1.applyTangle(tangleProg);
  rope1.updateVisual();

  const ep2L = getRopeEndpoint(ropeAngle2);
  const ep2R = getRopeEndpoint(ropeAngle2);
  rope2.computeShape(ropeAngle2, ep2L.y, ep2L.z, ep2R.y, ep2R.z);
  if(tangled) rope2.applyTangle(tangleProg);
  rope2.updateVisual();

  // Turner anim
  animateTurner(turnerLModel, ropeAngle1, ropeAngle2, dt, 'L');
  animateTurner(turnerRModel, ropeAngle1, ropeAngle2, dt, 'R');

  // Flow decay
  flow = Math.max(0, flow - dt*2);

  // Update model
  playerModel.position.copy(playerPos);
  playerModel.rotation.y = playerYaw;
  jumperLean = lerp(jumperLean, 0, dt*5);
  playerModel.rotation.z = jumperLean;

  animatePlayer(playerModel, dt);
  updateCamera(dt);
  tickParticles(dt);

  // HUD updates
  $score.textContent = score;
  $combo.textContent = combo > 1 ? combo + 'x COMBO' : '';
  $jumps.textContent = totalJ;
  $flowFill.style.width = flow + '%';
  $compFill.style.width = composure + '%';
  $accFill.style.width = accuracy + '%';
  const m = floor(gTime/60), s = floor(gTime%60);
  $timer.textContent = m + ':' + (s<10?'0':'') + s;
}

// ═══════════════════════════════════
//  MAIN LOOP
// ═══════════════════════════════════
let lastTime = 0;

function gameLoop(time){
  requestAnimationFrame(gameLoop);
  const dt = Math.min((time - lastTime) / 1000, 0.1);
  lastTime = time;

  update(dt);

  // Clear just-pressed
  for(const k in jp) jp[k] = false;

  renderer.render(scene, camera);
}

// ═══════════════════════════════════
//  INIT
// ═══════════════════════════════════
buildEnvironment();
buildSpectators();
initGameObjects();
showMenu();
bindDiffArrows();

requestAnimationFrame(gameLoop);

</script>
